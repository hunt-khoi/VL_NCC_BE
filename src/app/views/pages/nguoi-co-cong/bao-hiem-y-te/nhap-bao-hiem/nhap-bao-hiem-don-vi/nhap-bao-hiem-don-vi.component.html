<kt-portlet>
	<div class="row">
		<div class="col-md-4" *ngIf="CapCoCau!=3">
			<kt-portlet-header [sticky]="true" [title]="'Đơn vị hành chánh'" [class]="'kt-portlet__head--lg'" [viewLoading$]="loading$">
			</kt-portlet-header>
			<div class="row" style="padding-left: 20px;">
				<div class="col-md-12">
					<mat-form-field>
						<input matInput [(ngModel)]="nam" placeholder="Năm" type="number"/>
					</mat-form-field>
				</div>
			</div>
			<m-tree-don-vi *ngIf="dataTreeDonVi ? dataTreeDonVi.length > 0 : false" [showCheck]="false" [classIconLeaf]="'fas fa-torii-gate'" 
				[classIconRoot]="'fas fa-landmark'" [nameNode]="'text'" [propNameChild]="'children'" [valuePhanQuyen]="dataTreeDonVi" 
				[textFeildRoof]="'Tất cả'" [idRoleKey]="'IdGroup'" (NodeActiveChange)="treeDonViChanged($event)">
			</m-tree-don-vi>
		</div>
		<div class="{{CapCoCau==3?'col-md-12':'col-md-8'}}">
			<m-nhap-bao-hiem-list [donvi]="donvi" [nam]="nam" [dot]="dot"></m-nhap-bao-hiem-list>
		</div>
	</div>
</kt-portlet>
