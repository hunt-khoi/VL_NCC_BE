<kt-portlet [options]="{headLarge: true}">
	<kt-portlet-header [sticky]="true" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTitle>
			<div class="kt-form__filtration">
				<h3 class="kt-portlet__head-title"><span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span></h3>
			</div>
		</ng-container>
		<ng-container ktPortletTools>
			<button (click)="Add()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" color="accent" type="button">
				<span translate="COMMON.CREATE"></span>
			</button>
		</ng-container>
	</kt-portlet-header>

	<div class="kt-portlet__body">
		<div class="mat-table__wrapper d-block">
			<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="RowID" matSortDirection="asc" matSortDisableClear>
				<ng-container matColumnDef="STT">
					<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell"><span translate="COMMON.STT"></span></th>
					<td mat-cell *matCellDef="let object;let vi = index" class="mat-column-vinCode stt-cell" >{{vi + 1}}</td>
				</ng-container>
				<ng-container matColumnDef="Title">
					<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode"><span translate="NGAYLE.title"></span></th>
					<td mat-cell *matCellDef="let object" class="mat-column-vinCode">
						<a href="javascript:;" (click)="EditNgayLe(object, false)">{{object.Title}}</a>
					</td>
				</ng-container>
				<ng-container matColumnDef="Ngay">
					<th mat-header-cell *matHeaderCellDef mat-sort-header><span translate="NGAYLE.ngay"></span></th>
					<td mat-cell *matCellDef="let object">{{object.Ngay | date: 'dd/MM/yyyy'}}</td>
				</ng-container>
				<ng-container matColumnDef="GhiChu">
					<th mat-header-cell *matHeaderCellDef mat-sort-header ><span translate="NGAYLE.ghichu"></span></th>
					<td mat-cell *matCellDef="let object" >{{object.GhiChu}}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedBy">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_BY"></span></th>
					<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.UpdatedBy}}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedDate">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_DATE"></span></th>
					<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.UpdatedDate}}</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center; width:100px;">
						<span translate="COMMON.TACVU"></span>
					</th>
					<td mat-cell *matCellDef="let object" class="action-cell" [ngClass]="list_button?'list-button':''">
						<button (click)="EditNgayLe(object, false)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button"
								matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
							<mat-icon>visibility</mat-icon>
							<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
						</button>
						<button (click)="EditNgayLe(object)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" 
							matTooltip="{{ 'COMMON.UPDATE' | translate }}" *ngIf="apiService.ReadOnlyControl" color="primary" type="button">
							<mat-icon>create</mat-icon>
							<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
						</button>
						<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" 
							(click)="DeleteWorkplace(object)" *ngIf="apiService.ReadOnlyControl" matTooltip="{{ 'COMMON.DELETE' | translate }}">
							<mat-icon>delete</mat-icon>
							<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
						</button>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="row.highlighted = !row.highlighted"
					[ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true"
					(mouseout)="row.hovered = false"></tr>
			</table>

			<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
		</div>

		<div class="mat-table__bottom">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
		</div>
	</div>
</kt-portlet>
