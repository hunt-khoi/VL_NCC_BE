
<div class="kt-portlet__head kt-portlet__head--fit">
	<div class="kt-portlet__head-caption">
		<div class="kt-portlet__head-title">
			<h5 class="kt-portlet__head-text">Danh sách quy trình theo loại hồ sơ</h5>
		</div>
	</div>
</div>

<div class="example-container-hc1 mat-table__wrapper">
	<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="DieuKien" #sort2='matSort' matSortDirection="asc" matSortDisableClear>
		<ng-container matColumnDef="#">
			<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode mat-header-cell-stt stt-cell">#</th>
			<td mat-cell *matCellDef="let item;let vi = index" class="mat-column-vinCode mat-cell-stt stt-cell">
				{{vi + 1}}
			</td>
		</ng-container>
		<ng-container matColumnDef="DieuKien">
			<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode">Tiêu đề</th>
			<td mat-cell *matCellDef="let item" class="mat-column-vinCode">
				<a href="javascript:;" (click)="UpdateDieuKien(item, false)">{{item.DieuKien}}</a>
			</td>
		</ng-container>
		<ng-container matColumnDef="DoiTuong">
			<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode">Loại hồ sơ</th>
			<td mat-cell *matCellDef="let item" class="mat-column-vinCode">{{item.DoiTuong}}</td>
		</ng-container>
		<ng-container matColumnDef="actions">
			<th mat-header-cell *matHeaderCellDef style="justify-content: center; width:80px">Tác vụ</th>
			<td mat-cell *matCellDef="let item" class="action-cell" [ngClass]="list_button?'list-button':''">
				<button (click)="UpdateDieuKien(item, false)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
					<mat-icon>visibility</mat-icon>
					<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
				</button>
				<ng-container *ngIf="allowEdit">
					<button (click)="UpdateDieuKien(item)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button">
						<mat-icon>create</mat-icon>
						<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
					</button>
					<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="deleteDieuKien(item)" matTooltip="{{ 'COMMON.DELETE' | translate }}">
						<mat-icon>delete</mat-icon>
						<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
					</button>
				</ng-container>
			</td>
		</ng-container>

		<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
		<tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="row.highlighted = !row.highlighted"
			[ngClass]="{hovered: row.hovered, highlighted: row.highlighted}"
			(mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></tr>
	</table>
	<div class="mat-table__message" *ngIf="!dataSource.hasItems">Không có dữ liệu</div>
</div>
<div class="mat-table__bottom" style="flex-wrap: wrap-reverse;">
	<div class="col-12 col-sm-8 col-md-8 kt--margin-bottom-10-mobile">
		<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
		<mat-paginator #paginator_tab2 [pageSize]="10" [pageSizeOptions]="[3, 5, 10]" 
		[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
	</div>
</div>
