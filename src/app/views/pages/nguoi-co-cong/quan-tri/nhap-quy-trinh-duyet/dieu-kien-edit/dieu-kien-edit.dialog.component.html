<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet" [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;" *ngIf="allowEdit">
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="{{'COMMON.LUU_DONG' | translate}}">
				<span translate="COMMON.LUU_DONG"></span>&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
			<button type="button" mat-raised-button color="primary" (click)="onSubmit(false)" [disabled]="disabledBtn" *ngIf="item.Id == 0" matTooltip="{{'COMMON.LUU_THEMMOI' | translate}}">
				<span translate="COMMON.LUU_THEMMOI"></span>&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm">
		<div class="kt-portlet__body">
			<div class="row">
				<div class="col-md-12 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'QUY_TRINH_DUYET.tieude' | translate }}" class="require" required
							formControlName="title" />
					</mat-form-field>
				</div>
				<div class="col-md-12 kt-margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<mat-select formControlName="value" class="require" required placeholder="Loại hồ sơ">
							<mat-option [value]="opt.id" *ngFor="let opt of listDT">
								{{opt.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-md-12 kt-margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<input matInput placeholder="{{ 'QUY_TRINH_DUYET.tgxa' | translate }}" formControlName="tgxa" type="number" min="0"/>
					</mat-form-field>
				</div>
				<div class="col-md-12 kt--margin-bottom-10-mobile">
					<mat-label>{{ 'QUY_TRINH_DUYET.dsbuocduyet' | translate }} </mat-label>
					<table style="width:100%" class="table-bordered">
						<tr>
							<th class="text-center" style="width:10%;">{{ 'QUY_TRINH_DUYET.vitri' | translate }}</th>
							<th class="text-center">{{ 'QUY_TRINH_DUYET.capquanly' | translate }}</th>
							<th class="text-center" style="width:20%;">{{ 'QUY_TRINH_DUYET.songayxl' | translate }}</th>
						</tr>
						<tr *ngFor="let de of item.CapQL">
							<td class="text-center">{{de.priority}}</td>
							<td>{{de.title}}</td>
							<td>
								<mat-form-field class="mat-form-field-fluid">
									<input matInput [(ngModel)]="de.SoNgay" [ngModelOptions]="{standalone: true}" placeholder="Số ngày xử lý" type="number" min="0" />
								</mat-form-field>
							</td>
						</tr>
					</table>
				</div>
			</div>
		</div>
	</form>
</div>
