<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn"
		title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet"
	[ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile"
			style="margin-top: 10px; text-align: right;">
			<!-- *ngIf="allowEdit" -->
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)"
				matTooltip="{{ 'DE_XUAT.DUYET' | translate }}">
				Duyệt &nbsp;&nbsp;
			</button>
			<button type="button" mat-raised-button color="primary" (click)="onSubmit(false)"
				matTooltip="{{ 'DE_XUAT.KODUYET' | translate }}">
				Không duyệt &nbsp;&nbsp;
			</button>
			<button type="button" mat-raised-button color="warn" (click)="closeForm()"
				matTooltip="{{'COMMON.CANCEL' | translate}}">
				<span translate="COMMON.CANCEL"></span>&nbsp;&nbsp;
			</button>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm">
		<div class="kt-portlet__body">
			<div class="form-group kt-form__group row">
				<div class="col-lg-12 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<textarea matInput rows="5" placeholder="{{ 'DE_XUAT.ghichuduyet' | translate }}"
							formControlName="GhiChu"></textarea>
					</mat-form-field>
				</div>
			</div>
		</div>
	</form>
	
</div>
