<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn"
			title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet"
	 [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			 style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;" *ngIf="allowEdit">
			
			<ng-container *ngIf="!nhanban;else nhanban1">
				<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" 
					[disabled]="disabledBtn" matTooltip="{{'COMMON.LUU_DONG' | translate}}">
					<span translate="COMMON.LUU_DONG"></span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
				</button>
				<button class="hide-view-625" type="button" mat-raised-button color="primary" (click)="onSubmit(false)" 
					[disabled]="disabledBtn" *ngIf="item.Id == 0" matTooltip="{{'COMMON.LUU_THEMMOI' | translate}}">
					<span translate="COMMON.LUU_THEMMOI"></span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
				</button>
			</ng-container>
			<ng-template #nhanban1>
				<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="{{ 'DOT_TANG_QUA.NHANBAN' | translate }}">
					<span>{{ 'DOT_TANG_QUA.NHANBAN' | translate }}</span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
				</button>
			</ng-template>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm">
		<div class="kt-portlet__body">
			<kt-alert *ngIf="hasFormErrors" type="warn" [showCloseButton]="true" [duration]="0" (close)="onAlertClose($event)">
				Không thể lưu, vui lòng nhập đủ thông tin!
			</kt-alert>

			<div class="form-group kt-form__group row">
				<div class="col-lg-6 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'DOT_TANG_QUA.NAME' | translate }}" formControlName="DotTangQua" class="require" required #focusInput />
					</mat-form-field>
				</div>
				<div class="col-lg-3 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select formControlName="Id_NhomLeTet" placeholder="{{'NHOM_LE_TET.NAME' | translate }}" class="require" required [disabled]="item.Id > 0">
							<mat-option *ngFor="let opt of listNhomLeTet;" [value]="opt.id">
								{{opt.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-lg-3 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="Năm" formControlName="Nam" class="require" required [readonly]="item.Id > 0" />
					</mat-form-field>
				</div>
				<div class="col-lg-3 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput type="number" placeholder="Thứ tự" formControlName="Priority" />
					</mat-form-field>
				</div>
				<div class="col-lg-9 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<textarea matInput rows="1" placeholder="{{ 'DOT_TANG_QUA.mota' | translate }}"
							formControlName="MoTa"></textarea>
					</mat-form-field>
				</div>
				<div class="col-lg-6 m--margin-bottom-20-mobile">
					<dl-image-control *ngIf="allowEdit" [data]="imagedata" formControlName="fileDinhKems" type="image/*" nameButton="Chọn file đính kèm" [multiple]="true" [disabled]="false">
					</dl-image-control>
				</div>
				<div class="col-lg-6 m--margin-bottom-20-mobile" [hidden]="item.Id == 0" style="margin-top: 20px;">
					<mat-checkbox formControlName="Locked">Khóa</mat-checkbox>
				</div>
			</div>
			<div class="row">
				<span class="kt-portlet__head-title">{{ 'DOT_TANG_QUA.dsdoituong_muc' | translate }}: <b>{{NCC_MQs.length}} đối tượng</b></span>
				<div class="table-responsive">
					<table mat-table style="width: 100%;overflow-y: hidden;" [dataSource]="datasource">
						<ng-container matColumnDef="select">
							<th mat-header-cell *matHeaderCellDef class="mat-column-checkbox" style="padding-right: 20px;" hidden>
								<mat-checkbox (change)="$event ? masterToggle() : null" [checked]="selection.hasValue() && isAllSelected()" [indeterminate]="selection.hasValue() && !isAllSelected()" [color]="'primary'" [disabled]="thaotac==0">
								</mat-checkbox>
							</th>
							<td mat-cell *matCellDef="let row" class="mat-column-checkbox" style="padding-right: 20px;" hidden>
								<mat-checkbox [(ngModel)]="row.selected" [ngModelOptions]="{standalone: true}" (click)="$event.stopPropagation()" (change)="$event ? selection.toggle(row) : null" [checked]="selection.isSelected(row)" [color]="'primary'" [disabled]="!allowEdit">
								</mat-checkbox>
							</td>
						</ng-container>
						<ng-container matColumnDef="STT">
							<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell" style="width: 30px;">STT</th>
							<td mat-cell class="stt-cell" *matCellDef="let item; let i=index">{{i+1}}</td>
						</ng-container>
						<ng-container matColumnDef="DoiTuong">
							<th mat-header-cell *matHeaderCellDef class="min-width-th" style="justify-content: center">
								Đối tượng
							</th>
							<td mat-cell *matCellDef="let opt" style="justify-content: center">{{opt.DoiTuong}}</td>
						</ng-container>
						<ng-container *ngFor="let ng of listNguon">
							<ng-container matColumnDef="Nguon{{ng.id}}">
								<th mat-header-cell *matHeaderCellDef style="justify-content: center;width: 100px;white-space: nowrap;">
									{{ng.title}}
								</th>
								<td mat-cell *matCellDef="let opt" style="justify-content: center">{{getValue(opt, ng.id)}}</td>
							</ng-container>
						</ng-container>
						<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
						<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
					</table>
				</div>
			</div>

		</div>
	</form>
</div>
