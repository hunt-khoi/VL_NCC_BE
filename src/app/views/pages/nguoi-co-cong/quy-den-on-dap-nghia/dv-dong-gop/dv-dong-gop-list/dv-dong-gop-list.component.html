<kt-portlet>
	<kt-portlet-header [sticky]="true" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTitle>
			<div class="kt-form__filtration">
				<h3 class="kt-portlet__head-title"><span translate="OBJECT.LIST"  [translateParams]="{name:this._name.toLowerCase()}"></span></h3>
			</div>
		</ng-container>
		<ng-container ktPortletTools>
			<button (click)="Import()" mat-raised-button color="info" matTooltip="Import đơn vị đóng góp" *ngIf="dvDongGopService1.ReadOnlyControl" type="button">
				<span>Import</span>
			</button>			
			<button (click)="AddWorkplace()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="dvDongGopService1.ReadOnlyControl" color="accent" type="button">
				<span translate="COMMON.CREATE"></span>
			</button>&nbsp;&nbsp;
			<a [routerLink]="['./bao-cao']" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button"
				matTooltip="Xem báo cáo vận động đóng góp" color="primary">
				<span class="button-text">Xem báo cáo</span>
			</a>
			<kt-column-option [gridService]="gridService"></kt-column-option>
		</ng-container> 
	</kt-portlet-header>

	<kt-portlet-body>
		<div class="mat-table__wrapper" cdkDropListGroup [ngStyle]="{'overflow-x': gridService.model.haveFilter?'unset':'auto'}">
			<table mat-table class="lmat-elevation-z8" [ngClass]="{'dl-table-flt': gridService.model.haveFilter}" #table [dataSource]="dataSource" matSort #sort1="matSort" matSortActive="Priority" 
				matSortDirection="asc" matSortDisableClear cdkDropListGroup>
				<ng-container matColumnDef="STT">
					<th mat-header-cell *matHeaderCellDef class="stt-cell mat-column-vinCode" column_name="STT" style="flex: 0 0 6%"><span translate="COMMON.STT"></span></th>
					<td mat-cell *matCellDef="let dvDongGop;let vi = index" class="mat-column-vinCode" style="flex: 0 0 6%">{{vi + 1}}</td>
				</ng-container>
				<ng-container matColumnDef="DVDongGop">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="DVDongGop" column_title="Họ tên"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" style="text-align: left;padding-bottom: 4px" *matCellDef="let dvDongGop">
						<a href="javascript:;"(click)="EditdvDongGop(dvDongGop, false)">{{dvDongGop.HoTen}}</a>
					</td>
				</ng-container>
				<ng-container matColumnDef="DiaChi">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="DiaChi" column_title="Địa chỉ"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" style="text-align: left;padding-bottom: 4px" *matCellDef="let dvDongGop">
						{{dvDongGop.DiaChi}}
					</td>
				</ng-container>
				<ng-container matColumnDef="GhiChu">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" column_name="MoTa" column_title="Ghi chú"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" style="text-align: left;padding-bottom: 4px" *matCellDef="let dvDongGop">
						{{dvDongGop.GhiChu}}
					</td>
				</ng-container>
				<ng-container matColumnDef="CreatedBy">
					<th mat-header-cell *matHeaderCellDef><span translate="DOITUONG_NCC.CREATEDBY"></span></th>
					<td mat-cell *matCellDef="let object">{{object.CreatedBy}}</td>
				</ng-container>
				<ng-container matColumnDef="CreatedDate">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="DOITUONG_NCC.CREATEDDATE"></span></th>
					<td mat-cell *matCellDef="let object" style="justify-content: center">{{object.CreatedDate }}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedBy">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_BY"></span></th>
					<td mat-cell *matCellDef="let item">{{item.UpdatedBy}}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedDate">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_DATE"></span></th>
					<td mat-cell *matCellDef="let item">{{item.UpdatedDate }}</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center; width:170px">
						<span translate="COMMON.TACVU"></span>
					</th>
					<td mat-cell *matCellDef="let dvDongGop" class="action-cell" [ngClass]="list_button?'list-button':''">
						<button type="button" (click)="EditdvDongGop(dvDongGop, false)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="info" matTooltip="{{ 'COMMON.DETAIL' | translate }}">
							<mat-icon>visibility</mat-icon>
							<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
						</button>
						<ng-container *ngIf="dvDongGop.AllowEdit">
							<button (click)="EditdvDongGop(dvDongGop)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button">
								<mat-icon>create</mat-icon>
								<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
							</button>
							<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="DeleteWorkplace(dvDongGop)" matTooltip="{{ 'COMMON.DELETE' | translate }}">
								<mat-icon>delete</mat-icon>
								<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
							</button>
						</ng-container>
					</td>
				</ng-container>

				
				<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns"></tr>
			</table>

			<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
		</div>

		<!-- start: BOTTOM -->
		<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
			<div class="flt-selected" *ngIf="gridService.model.haveFilter">
				<mat-chip-list>
					<ng-container *ngFor="let chip of gridService.model.lstChip">
						<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
							{{chip.title}}: {{chip.data}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
						<ng-container *ngIf="chip.type==1">
							<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
								{{chip.title}}: {{item.name}}
								<mat-icon matChipRemove>cancel</mat-icon>
							</mat-chip>
						</ng-container>
					</ng-container>
					<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
						Đặt lại
					</mat-chip>
				</mat-chip-list>
			</div>
			<div class="flt-page">
				<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
				<mat-paginator [pageSize]="10" [pageSizeOptions]="gridService.model.pageSize" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
			</div>
		</div>
		<!-- end: BOTTOM -->
	</kt-portlet-body>
</kt-portlet>
