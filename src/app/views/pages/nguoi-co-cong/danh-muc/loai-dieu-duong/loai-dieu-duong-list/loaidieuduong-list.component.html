<style>
	.m--padding-10 {
		text-align: left; 
		padding-bottom: 4px;
	}
</style>
<kt-portlet [options]="{headLarge: true}">
	<kt-portlet-header [sticky]="true" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTitle>
			<div class="kt-form__filtration">
				<h3 class="kt-portlet__head-title">
					<span translate="OBJECT.LIST"  [translateParams]="{name:this._name.toLowerCase()}"></span>
				</h3>
			</div>
		</ng-container>
		<ng-container ktPortletTools>
			<button (click)="Add()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="!apiService.ReadOnlyControl" color="accent" type="button">
				<span translate="COMMON.CREATE"></span>
			</button>
			<kt-column-option [gridService]="gridService"></kt-column-option>
		</ng-container>
	</kt-portlet-header>

	<kt-portlet-body>
		<div class="mat-table__wrapper" cdkDropListGroup [ngStyle]="{'overflow-x': gridService.model.haveFilter?'unset':'auto'}">
			<table mat-table class="lmat-elevation-z8" [ngClass]="{'dl-table-flt': gridService.model.haveFilter}" #table [dataSource]="dataSource" 
				matSort #sort1="matSort" matSortActive="Priority" matSortDirection="asc" matSortDisableClear cdkDropListGroup>
				<ng-container matColumnDef="STT">
					<th mat-header-cell *matHeaderCellDef class="stt-cell mat-column-vinCode" column_name="STT" style="flex: 0 0 6%"><span translate="COMMON.STT"></span></th>
					<td mat-cell *matCellDef="let item; let vi = index" class="mat-column-vinCode" style="flex: 0 0 6%">{{vi + 1}}</td>
				</ng-container>
				<ng-container matColumnDef="LoaiDieuDuong">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="LoaiDieuDuong" column_title="Loại điều dưỡng"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">
						<a href="javascript:;" (click)="Edit(item, false)">{{item.LoaiDieuDuong}}</a>
					</td>
				</ng-container>
				<ng-container matColumnDef="MoTa">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" column_name="MoTa" column_title="Mô tả"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">{{item.MoTa}}</td>
				</ng-container>
				<ng-container matColumnDef="Locked">
					<th style="white-space: nowrap;" mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Locked" column_title="Tình trạng"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" style="white-space: nowrap; text-align: left" *matCellDef="let item">
						<span class="kt-badge kt-badge--inline kt-badge--pill kt-badge--wide {{getItemCssClassByStatus(item.Locked)}}">
							{{getItemStatusString(item.Locked)}}
						</span>
					</td>
				</ng-container>
				<ng-container matColumnDef="Priority">
					<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode" mat-sort-header column_name="Priority" style="flex: 0 0 6%">Thứ tự</th>
					<td mat-cell *matCellDef="let item;" class="mat-column-vinCode" style="flex: 0 0 6%">{{item.Priority}}</td>
				</ng-container>
				
				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center; width:170px">
						<span translate="COMMON.TACVU"></span>
					</th>
					<td mat-cell *matCellDef="let item" class="action-cell" [ngClass]="list_button?'list-button':''">
						<button mat-button (click)="Edit(item, false)" [ngClass]="btnClass" 
						 	matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
							<mat-icon>visibility</mat-icon>
							<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
						</button>
						<ng-container *ngIf="!apiService.ReadOnlyControl">
							<button mat-button (click)="Lock(item, false)" [ngClass]="btnClass" *ngIf="item.Locked"
							 	matTooltip="Mở khóa" color="primary" type="button">
								<mat-icon>lock_open</mat-icon>
								<span class="button-text">Mở khóa</span>
							</button>
							<button mat-button (click)="Lock(item)" [ngClass]="btnClass" *ngIf="!item.Locked" 
							 	matTooltip="Khóa" type="button" color="warn">
								<mat-icon>lock</mat-icon>
								<span class="button-text">Khóa</span>
							</button>
							<button mat-button (click)="Edit(item)" [ngClass]="btnClass" 
								matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button">
								<mat-icon>create</mat-icon>
								<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
							</button>
							<button mat-button (click)="Delete(item)" [ngClass]="btnClass" 
								matTooltip="{{ 'COMMON.DELETE' | translate }}" color="warn" type="button">
								<mat-icon>delete</mat-icon>
								<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
							</button>
						</ng-container>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns"></tr>
			</table>
			<div class="mat-table__message" *ngIf="!dataSource.hasItems">{{'COMMON.NO_RECORD_FOUND'|translate}}</div>
		</div>

		<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
			<div class="flt-selected" *ngIf="gridService.model.haveFilter">
				<kt-chip-filter [gridService]="gridService"></kt-chip-filter>
			</div>
			<div class="flt-page">
				<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
				<mat-paginator [pageSize]="10" [pageSizeOptions]="gridService.model.pageSize" 
					[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true">
				</mat-paginator>
			</div>
		</div>
	</kt-portlet-body>
</kt-portlet>
