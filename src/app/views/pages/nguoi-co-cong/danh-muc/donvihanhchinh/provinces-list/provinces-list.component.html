<div class="kt-portlet__head kt-portlet__head--lg">
	<div class="kt-portlet__head-label">
		<h3 class="kt-portlet__head-title">
			<span translate="OBJECT.LIST" [translateParams]="{name:_name.toLowerCase()}"></span>
		</h3>
	</div>
	<div class="kt-portlet__head-toolbar">
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</div>
</div>
<div class="kt-portlet__body">
	
	<div class="example-container-hc mat-table__wrapper" [ngStyle]="{'height': getHeight()}">
		<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="id" matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}">
			<!-- Checkbox Column -->
			<ng-container matColumnDef="STT">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell" style="flex: 0 0 5%">
					<span translate="COMMON.STT"></span>
				</th>
				<td mat-cell *matCellDef="let item; let vi = index" class="mat-column-vinCode" style="flex: 0 0 5%">{{vi + 1}}</td>
			</ng-container>
			<ng-container matColumnDef="Id_row">
				<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode stt-cell" style="flex: 0 0 8%">ID</th>
				<td mat-cell *matCellDef="let item" class="mat-column-vinCode" style="flex: 0 0 8%">{{item.Id_row}}</td>
			</ng-container>
			<ng-container matColumnDef="ProvinceName">
				<th style="white-space: nowrap;flex: 0 0 40%" class="mat-column-vinCode" mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="ProvinceName" [column_title]="_name"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item" class="mat-column-vinCode" style="flex: 0 0 40%">{{item.ProvinceName}}</td>
			</ng-container>
			<ng-container matColumnDef="NguoiCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_BY"></span></th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.NguoiCapNhat}}</td>
			</ng-container>
			<ng-container matColumnDef="NgayCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_DATE"></span></th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.NgayCapNhat | date: 'dd/MM/yyyy HH:mm' }}</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="row.highlighted = !row.highlighted" 
				[ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false">
			</tr>
		</table>
		<div class="mat-table__message" *ngIf="!dataSource.hasItems">{{'COMMON.NO_RECORD_FOUND'|translate}}</div>
	</div>

	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
			<kt-chip-filter [gridService]="gridService"></kt-chip-filter>
		</div>
		<div class="flt-page" style="width: 50%;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" 
				[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true">
			</mat-paginator>
		</div>
	</div>
</div>
