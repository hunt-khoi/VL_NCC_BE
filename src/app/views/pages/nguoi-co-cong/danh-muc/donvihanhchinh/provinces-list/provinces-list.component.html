<div class="kt-portlet__head kt-portlet__head--lg">
	<div class="kt-portlet__head-label">
		<h3 class="kt-portlet__head-title">
			<span translate="OBJECT.LIST" [translateParams]="{name:_name.toLowerCase()}"></span>
		</h3>
	</div>
	<div class="kt-portlet__head-toolbar">
		<button (click)="Add()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="provincesService1.ReadOnlyControl" color="accent" type="button">
			<span translate="COMMON.CREATE"></span>
		</button>
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</div>
</div>
<div class="kt-portlet__body">
	
	<div class="example-container-hc mat-table__wrapper" [ngStyle]="{'height': getHeight()}">
		<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="id" matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}">
			<!-- Checkbox Column -->
			<ng-container matColumnDef="STT">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell" style="flex: 0 0 5%"><span translate="COMMON.STT"></span></th>
				<td mat-cell *matCellDef="let provinces;let vi = index" class="mat-column-vinCode" style="flex: 0 0 5%">{{vi + 1}}</td>
			</ng-container>
			<ng-container matColumnDef="Id_row">
				<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode stt-cell" style="flex: 0 0 8%">ID</th>
				<td mat-cell *matCellDef="let provinces" class="mat-column-vinCode" style="flex: 0 0 8%">{{provinces.Id_row}}</td>
			</ng-container>
			<ng-container matColumnDef="ProvinceName">
				<th style="white-space: nowrap;flex: 0 0 40%" class="mat-column-vinCode" mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="ProvinceName" [column_title]="_name"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let provinces" class="mat-column-vinCode" style="flex: 0 0 40%">{{provinces.ProvinceName}}</td>
			</ng-container>
			<ng-container matColumnDef="NguoiCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_BY"></span></th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.NguoiCapNhat}}</td>
			</ng-container>
			<ng-container matColumnDef="NgayCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_DATE"></span></th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.NgayCapNhat | date: 'dd/MM/yyyy HH:mm' }}</td>
			</ng-container>

			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<span translate="COMMON.TACVU"></span>
				</th>
				<td mat-cell *matCellDef="let provinces" class="action-cell" [ngClass]="list_button?'list-button':''">
					<button (click)="Update(provinces)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" *ngIf="provincesService1.ReadOnlyControl && provinces.CustemerID" type="button">
						<mat-icon>create</mat-icon>
						<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
					</button>
					<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="Delete(provinces)" matTooltip="{{ 'COMMON.DELETE' | translate }}" *ngIf="provincesService1.ReadOnlyControl && provinces.CustemerID">
						<mat-icon>delete</mat-icon>
						<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
					</button>&nbsp;
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="row.highlighted = !row.highlighted" [ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></tr>
		</table>

		<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
	</div>

	<!-- start: BOTTOM -->
	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
			<mat-chip-list>
				<ng-container *ngFor="let chip of gridService.model.lstChip">
					<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
						{{chip.title}}: {{chip.data}}
						<mat-icon matChipRemove>cancel</mat-icon>
					</mat-chip>
					<ng-container *ngIf="chip.type==1">
						<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
							{{chip.title}}: {{item.name}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
					</ng-container>
				</ng-container>
				<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
					Đặt lại
				</mat-chip>
			</mat-chip-list>
		</div>
		<div class="flt-page" style="width: 50%;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
		</div>
	</div>
	<!-- end: BOTTOM -->
</div>
