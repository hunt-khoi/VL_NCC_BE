<kt-portlet-header [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
	<ng-container ktPortletTitle>
		<div class="kt-form__filtration">
			<h3 class="kt-portlet__head-title"><span translate="OBJECT.LIST"  [translateParams]="{name:this._name.toLowerCase()}"></span></h3>
		</div>
	</ng-container>
	<ng-container ktPortletTools>
		<button (click)="Add()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="wardService.ReadOnlyControl" color="accent" type="button">
			<span translate="COMMON.CREATE"></span>
		</button>
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</ng-container>
</kt-portlet-header>

<div class="kt-portlet__body">
	<div class="kt-form">
		<div class="kt-form__filtration">
			<div class="row align-items-center">
				<div class="col-md-3 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select [(value)]="filterprovinces" placeholder="{{'PROVINCE.NAME' | translate}}" (selectionChange)="loadQuanHuyenChange()" class="mat-form-field mat-form-field-fluid" disabled="true">
							<mat-option [value]="list.id_row" *ngFor="let list of listprovinces;">
								{{list.Province}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-md-3 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select [(value)]="filterdistrict" placeholder="{{'DISTRICT.NAME' | translate}}" (selectionChange)="loadWard()" class="mat-form-field mat-form-field-fluid">
							<mat-option value="">Tất cả</mat-option>
							<mat-option value="{{list.ID_Row}}" *ngFor="let list of listdistrict;">
								{{list.District}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-md-3 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select [(value)]="filterward" placeholder="{{'WARD.NAME' | translate}}" (selectionChange)="loadDataList()" class="mat-form-field mat-form-field-fluid">
							<mat-option value="">Tất cả</mat-option>
							<mat-option value="{{list.ID_Row}}" *ngFor="let list of listward;">
								{{list.Ward}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
			</div>
		</div>
	</div>

	<div class="mat-table__wrapper">
		<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" style="width: 100%" matSort matSortActive="Title" 
			matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}">
			<ng-container matColumnDef="RowID">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center" class="stt-cell">ID</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.RowID}}</td>
			</ng-container>
			<ng-container matColumnDef="Title">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode" style="flex: 0 0 40%">
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Title" [column_title]="_name"> </kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item" class="mat-column-vinCode">{{item.Title}}</td>
			</ng-container>
			<ng-container matColumnDef="WardName">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode" style="flex: 0 0 40%">
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="WardName" column_title="Phường xã"> </kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item" class="mat-column-vinCode">{{item.WardName}}</td>
			</ng-container>
			<ng-container matColumnDef="DistrictName">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode" style="flex: 0 0 40%">
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="DistrictName" column_title="Quận huyện"> </kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item" class="mat-column-vinCode">{{item.DistrictName}}</td>
			</ng-container>
			<ng-container matColumnDef="NguoiCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<span translate="COMMON.UPDATED_BY"></span>
				</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.NguoiCapNhat}}</td>
			</ng-container>
			<ng-container matColumnDef="NgayCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<span translate="COMMON.UPDATED_DATE"></span>
				</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">
					{{item.LastModified | date: 'dd/MM/yyyy HH:mm' }}
				</td>
			</ng-container>

			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center;width: 125px" class="text-center">
					<span translate="COMMON.TACVU"></span>
				</th>
				<td mat-cell *matCellDef="let item" class="action-cell" [ngClass]="list_button?'list-button':''">
					<button (click)="Update(item)"  mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button" *ngIf="wardService.ReadOnlyControl && item.CustemerID">
						<mat-icon>create</mat-icon>
						<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
					</button>
					<button  mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="Delete(item)" matTooltip="{{ 'COMMON.DELETE' | translate }}" *ngIf="wardService.ReadOnlyControl && item.CustemerID">
						<mat-icon>delete</mat-icon>
						<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
					</button>&nbsp;
				</td>
			</ng-container>
			
			<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns; sticky: true"></tr>
			<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns" (click)="row.highlighted = !row.highlighted" [ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></tr>
		</table>

		<div class="mat-table__message" *ngIf="!dataSource.hasItems">
			<span translate="COMMON.NO_RECORD_FOUND"></span>
		</div>
	</div>

	<!-- start: BOTTOM -->
	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
			<mat-chip-list>
				<ng-container *ngFor="let chip of gridService.model.lstChip">
					<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
						{{chip.title}}: {{chip.data}}
						<mat-icon matChipRemove>cancel</mat-icon>
					</mat-chip>
					<ng-container *ngIf="chip.type==1">
						<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
							{{chip.title}}: {{item.name}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
					</ng-container>
				</ng-container>
				<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
					Đặt lại
				</mat-chip>
			</mat-chip-list>
		</div>
		<div class="flt-page" style="width: 50%;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
		</div>
	</div>
	<!-- end: BOTTOM -->
</div>
