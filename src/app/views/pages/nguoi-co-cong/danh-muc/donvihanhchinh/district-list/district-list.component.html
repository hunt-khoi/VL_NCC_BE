<kt-portlet-header [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
	<ng-container ktPortletTitle>
		<div class="kt-form__filtration">
			<h3 class="kt-portlet__head-title"><span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span></h3>
		</div>
	</ng-container>
	<ng-container ktPortletTools>
		<button (click)="Add()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="districtService1.ReadOnlyControl" color="accent" type="button">
			<span translate="COMMON.CREATE"></span>
		</button>
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</ng-container>
</kt-portlet-header>

<kt-portlet-body>
	<div class="kt-form">
		<div class="kt-form__filtration">
			<div class="row align-items-center">
				<div class="col-md-3 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select [(value)]="filterprovinces" placeholder="{{'PROVINCE.NAME' | translate}}" (selectionChange)="loadDataList()" class="mat-form-field mat-form-field-fluid" disabled="true">
							<mat-option [value]="list.id_row" *ngFor="let list of listprovinces;">{{list.Province}}</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
			</div>
		</div>
	</div>

	<div class="example-container-hc1 mat-table__wrapper">
		<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" style="width: 100%" matSort matSortActive="DistrictName" 
			matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}">
			<ng-container matColumnDef="Id_row">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center" class=" stt-cell">ID</th>
				<td mat-cell *matCellDef="let district" style="justify-content: center">{{district.Id_row}}</td>
			</ng-container>
			<ng-container matColumnDef="DistrictName">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="DistrictName" [column_title]="_name"> </kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let district" class="mat-column-vinCode">{{district.DistrictName}}</td>
			</ng-container>
			<ng-container matColumnDef="Note">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode"><span translate="COMMON.NOTE"></span></th>
				<td mat-cell *matCellDef="let district" class="mat-column-vinCode">{{district.Note}}</td>
			</ng-container>
			<ng-container matColumnDef="NguoiCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_BY"></span></th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.NguoiCapNhat}}</td>
			</ng-container>
			<ng-container matColumnDef="NgayCapNhat">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="COMMON.UPDATED_DATE"></span></th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.LastModified | date: 'dd/MM/yyyy HH:mm' }}</td>
			</ng-container>
			
			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef class="text-center" style="justify-content: center;width: 125px">
					<span translate="COMMON.TACVU"></span>
				</th>
				<td mat-cell *matCellDef="let district" class="action-cell" [ngClass]="list_button?'list-button':''">
					<button (click)="Update(district)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button" *ngIf="districtService1.ReadOnlyControl && district.CustemerID">
						<mat-icon>create</mat-icon>
						<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
					</button>
					<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="Delete(district)" matTooltip="{{ 'COMMON.DELETE' | translate }}" *ngIf="districtService1.ReadOnlyControl && district.CustemerID">
						<mat-icon>delete</mat-icon>
						<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
					</button>
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
			<tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="row.highlighted = !row.highlighted" [ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></tr>
		</table>

		<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
	</div>

	<!-- start: BOTTOM -->
	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
			<mat-chip-list>
				<ng-container *ngFor="let chip of gridService.model.lstChip">
					<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
						{{chip.title}}: {{chip.data}}
						<mat-icon matChipRemove>cancel</mat-icon>
					</mat-chip>
					<ng-container *ngIf="chip.type==1">
						<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
							{{chip.title}}: {{item.name}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
					</ng-container>
				</ng-container>
				<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
					Đặt lại
				</mat-chip>
			</mat-chip-list>
		</div>
		<div class="flt-page" style="width: 50%;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
		</div>
	</div>
	<!-- end: BOTTOM -->
</kt-portlet-body>
