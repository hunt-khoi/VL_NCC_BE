<style>
	.dt-overflow {
		overflow: hidden;
		line-height: 2rem;
		max-height: 8rem;
		-webkit-box-orient: vertical;
		display: block;
		display: -webkit-box;
		overflow: hidden !important;
		text-overflow: ellipsis;
		-webkit-line-clamp: 2;
		max-width: 800px;
	}
</style>
<kt-portlet-header [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
	<ng-container ktPortletTitle>
		<div class="kt-form__filtration">
			<h3 class="kt-portlet__head-title">
				<span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span>
			</h3>
		</div>
	</ng-container>
	<ng-container ktPortletTools>
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</ng-container>
</kt-portlet-header>

<kt-portlet-body>
	<div class="mat-table__wrapper" cdkDropListGroup [ngStyle]="{'overflow-x': gridService.model.haveFilter?'unset':'auto'}">
		<table mat-table class="lmat-elevation-z8" [ngClass]="{'dl-table-flt': gridService.model.haveFilter}" #table [dataSource]="dataSource" 
			matSort #sort1="matSort" matSortActive="MaLoaiHoSo" matSortDirection="asc" matSortDisableClear cdkDropListGroup>
			<ng-container matColumnDef="STT">
				<th mat-header-cell *matHeaderCellDef class="stt-cell mat-column-vinCode" column_name="STT" style="flex: 0 0 6%"><span translate="COMMON.STT"></span></th>
				<td mat-cell *matCellDef="let danhmuckhac;let vi = index" class="mat-column-vinCode" style="flex: 0 0 6%">{{vi + 1}}</td>
			</ng-container>
			<ng-container matColumnDef="MaLoaiHoSo">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="MaLoaiHoSo" column_title="{{ 'DM_KHAC.MALOAIHOSO' | translate }}"></kt-column-filter>
				</th>
				<td mat-cell class="m--padding-10" style="text-align: left;padding-bottom: 4px" *matCellDef="let danhmuckhac">
					{{danhmuckhac.MaLoaiHoSo}}
				</td>
			</ng-container>
			<ng-container matColumnDef="LoaiHoSo">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="LoaiHoSo" column_title="{{ 'DM_KHAC.LOAIHOSO' | translate }}"></kt-column-filter>
				</th>
				<td mat-cell class="m--padding-10" style="text-align: left;padding-bottom: 4px" *matCellDef="let danhmuckhac">
					<a href="javascript:;" (click)="Config(danhmuckhac, false)"><div class="dt-overflow">{{danhmuckhac.LoaiHoSo}}</div></a>
				</td>
			</ng-container>
			<ng-container matColumnDef="Id_DoiTuongNCC">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Id_DoiTuongNCC" column_title="Đối tượng NCC"></kt-column-filter>
				</th>
				<td mat-cell class="m--padding-10" style="text-align: left;padding-bottom: 4px" *matCellDef="let danhmuckhac">
					{{danhmuckhac.DoiTuong}}
				</td>
			</ng-container>
			<ng-container matColumnDef="MoTa">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" column_name="MoTa" column_title="{{ 'DM_KHAC.MOTA' | translate }}"></kt-column-filter>
				</th>
				<td mat-cell class="m--padding-10" style="text-align: left;padding-bottom: 4px" *matCellDef="let danhmuckhac">
					{{danhmuckhac.MoTa}}
				</td>
			</ng-container>

			<ng-container matColumnDef="config">
				<th mat-header-cell *matHeaderCellDef class="text-center" style=" width:170px">
					<span translate="COMMON.TACVU"></span>
				</th>
				<td mat-cell *matCellDef="let danhmuckhac" class="action-cell" [ngClass]="list_button?'list-button':''">
					<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" (click)="Config(danhmuckhac, false)">
						<mat-icon>visibility</mat-icon>
						<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
					</button>
					<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" (click)="Config(danhmuckhac)">
						<mat-icon>edit</mat-icon>
						<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
					</button>
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns"></tr>
		</table>
		<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
	</div>


	<!-- start: BOTTOM -->
	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter">
			<mat-chip-list>
				<ng-container *ngFor="let chip of gridService.model.lstChip">
					<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
						{{chip.title}}: {{chip.data}}
						<mat-icon matChipRemove>cancel</mat-icon>
					</mat-chip>
					<ng-container *ngIf="chip.type==1">
						<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
							{{chip.title}}: {{item.name}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
					</ng-container>
				</ng-container>
				<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
					Đặt lại
				</mat-chip>
			</mat-chip-list>
		</div>
		<div class="flt-page">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="gridService.model.pageSize" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
		</div>
	</div>
	<!-- end: BOTTOM -->
</kt-portlet-body>
