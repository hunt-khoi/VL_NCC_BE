<kt-portlet [options]="{headLarge: true}">
	<kt-portlet-header [sticky]="true" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTitle>
			<div class="kt-form__filtration">
				<h3 class="kt-portlet__head-title">
					<span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span>
				</h3>
			</div>
		</ng-container>
		<ng-container ktPortletTools>
			<button (click)="Add()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="apiService.ReadOnlyControl" color="accent" type="button">
				<span translate="COMMON.CREATE"></span>
			</button>
		</ng-container>
	</kt-portlet-header>

	<div class="kt-portlet__body">
		<div class="kt-form">
			<div class="row align-items-center collapse kt-form__group-actions m--margin-top-20 m--margin-bottom-20"
				[ngClass]="{'show' : selection.selected.length > 0}">
				<div class="col-xl-12">
					<div class="kt-form__group kt-form__group--inline">
						<div class="kt-form__label kt-form__label-no-wrap">
							<label class="m--font-bold m--font-danger-">
								Số lượng đã chọn: {{ selection.selected.length }}
							</label>
						</div>
						<div class="kt-form__control kt-form__group--inline">
							<button mat-raised-button color="accent" matTooltip="Delete selected products">
								<mat-icon>delete</mat-icon> Delete All
							</button>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="mat-table__wrapper">
			<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="Id_CV" 
				matSortDirection="asc" matSortDisableClear cdkDropListGroup>
				<ng-container matColumnDef="STT">
					<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell"><span translate="COMMON.STT"></span></th>
					<td mat-cell *matCellDef="let item; let vi = index" class="mat-column-vinCode stt-cell">{{vi + 1}}</td>
				</ng-container>
				<ng-container matColumnDef="Id_CV">
					<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode">ID</th>
					<td mat-cell *matCellDef="let item" class="mat-column-vinCode">{{item.Id_CV}}</td>
				</ng-container>
				<ng-container matColumnDef="MaCV">
					<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode">
						<span translate="CHUC_DANH.machucdanh"></span>
					</th>
					<td mat-cell *matCellDef="let item" class="mat-column-vinCode">{{item.MaCV}}</td>
				</ng-container>
				<ng-container matColumnDef="TenCV">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>
						<span translate="CHUC_DANH.tenchucdanh"></span>
					</th>
					<td mat-cell *matCellDef="let item">
						<a href="javascript:;" (click)="Edit(item, false)">{{item.TenCV}}</a>
					</td>
				</ng-container>
				<ng-container matColumnDef="Cap">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>
						<span translate="CHUC_DANH.cap"></span>
					</th>
					<td mat-cell *matCellDef="let item">{{item.Cap}}</td>
				</ng-container>
				<ng-container matColumnDef="NguoiCapNhat">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center">
						<span translate="COMMON.UPDATED_BY"></span>
					</th>
					<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.NguoiCapNhat}}</td>
				</ng-container>
				<ng-container matColumnDef="NgayCapNhat">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center">
						<span translate="COMMON.UPDATED_DATE"></span>
					</th>
					<td mat-cell *matCellDef="let item" style="justify-content: center">
						{{item.NgayCapNhat | date: 'dd/MM/yyyy HH:mm' }}
					</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center; width:100px;">
						<span translate="COMMON.TACVU"></span>
					</th>
					<td mat-cell *matCellDef="let item" class="action-cell" [ngClass]="list_button ? 'list-button' : ''">
						<button mat-button (click)="Edit(item, false)" [ngClass]="btnClass" 
							matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
							<mat-icon>visibility</mat-icon>
							<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
						</button>
						<button mat-button (click)="Edit(item)" [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl"
							matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button">
							<mat-icon>create</mat-icon>
							<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
						</button>
						<button mat-button (click)="Delete(item)" [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl"
							matTooltip="{{ 'COMMON.DELETE' | translate }}" color="warn" type="button">
							<mat-icon>delete</mat-icon>
							<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
						</button>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="row.highlighted = !row.highlighted"
					[ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false">
				</tr>
			</table>
			<div class="mat-table__message" *ngIf="!dataSource.hasItems">{{'COMMON.NO_RECORD_FOUND'|translate}}</div>
		</div>

		<div class="mat-table__bottom">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="pageSize" [pageSizeOptions]="[10, 20, 50, 100]" 
				[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true">
			</mat-paginator>
		</div>
	</div>
</kt-portlet>
