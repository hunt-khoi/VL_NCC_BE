<kt-portlet [options]="{headLarge: true}">
	<kt-portlet-header [sticky]="true" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTitle>
			<div class="kt-form__filtration">
				<h3 class="kt-portlet__head-title"><span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span></h3>
			</div>
		</ng-container>
		<ng-container ktPortletTools>
			<button (click)="AddWorkplace()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="objectService.ReadOnlyControl" color="accent" type="button">
				<span translate="COMMON.CREATE"></span>
			</button>
			<kt-column-option [gridService]="gridService"></kt-column-option>
		</ng-container>
	</kt-portlet-header>

	<div class="kt-portlet__body">
		<mat-tab-group [selectedIndex]="selectedTab" (selectedIndexChange)="changeTab( $event)">
			<mat-tab [label]="'QHGĐ đối tượng người có công'">
			</mat-tab>
			<mat-tab [label]="'QHGĐ đối tượng nhận quà'">
			</mat-tab>
		</mat-tab-group>

		<div class="mat-table__wrapper">
			<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="Priority" 
				matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}">
				<ng-container matColumnDef="STT">
					<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell"><span translate="COMMON.STT"></span></th>
					<td mat-cell *matCellDef="let object;let vi = index" class="mat-column-vinCode stt-cell">{{vi + 1}}</td>
				</ng-container>
				<ng-container matColumnDef="Id">
					<th mat-header-cell *matHeaderCellDef class="stt-cell">ID</th>
					<td mat-cell *matCellDef="let object" class="stt-cell">{{object.Id}}</td>
				</ng-container>
				<ng-container matColumnDef="QHGiaDinh">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter enable_sort="true" [gridService]="gridService" column_name="QHGiaDinh" [column_title]="_name"></kt-column-filter>
					</th>
					<td mat-cell *matCellDef="let object"><a href="javascript:;" (click)="Editobject(object, false)">{{object.QHGiaDinh}}</a></td>
				</ng-container>
				<!-- <div *ngIf="selectedTab==0"> -->
					<ng-container matColumnDef="IsChuYeu">
						<th mat-header-cell *matHeaderCellDef>
							<kt-column-filter [gridService]="gridService" column_name="IsChuYeu" [column_title]="'Là thân nhân chủ yếu'"></kt-column-filter>
						</th>
						<td mat-cell *matCellDef="let object"><mat-checkbox disabled [checked]="object.IsChuYeu"></mat-checkbox></td>
					</ng-container>
				<!-- </div> -->
				<ng-container matColumnDef="Locked">
					<th style="white-space: nowrap;" mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Locked" [column_title]="_LOCKED"></kt-column-filter>
					</th>
					<td mat-cell [ngClass]="{'m--padding-10': true}" style="white-space: nowrap; text-align: left" *matCellDef="let object">
						<span class="kt-badge kt-badge--inline kt-badge--pill kt-badge--wide {{getItemCssClassByStatus(object.Locked)}}">{{getItemStatusString(object.Locked)}}</span>
					</td>
				</ng-container>
				<ng-container matColumnDef="Priority">
					<th mat-header-cell *matHeaderCellDef mat-sort-header><span translate="QUANHEGIADINH.PRIORITY"></span></th>
					<td mat-cell *matCellDef="let object">{{object.Priority}}</td>
				</ng-container>
				<ng-container matColumnDef="CreatedBy">
					<th mat-header-cell *matHeaderCellDef><span translate="QUANHEGIADINH.CREATEDBY"></span></th>
					<td mat-cell *matCellDef="let object">{{object.CreatedBy}}</td>
				</ng-container>
				<ng-container matColumnDef="CreatedDate">
					<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="QUANHEGIADINH.CREATEDDATE"></span></th>
					<td mat-cell *matCellDef="let object" style="justify-content: center">{{object.CreatedDate }}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedBy">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_BY"></span></th>
					<td mat-cell *matCellDef="let item">{{item.UpdatedBy}}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedDate">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_DATE"></span></th>
					<td mat-cell *matCellDef="let item">{{item.UpdatedDate }}</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style="width: 180px;">
						<span translate="COMMON.TACVU"></span>
					</th>
					<td mat-cell *matCellDef="let object" class="action-cell" [ngClass]="list_button?'list-button':''">
						<button (click)="Editobject(object, false)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.DETAIL' | translate }}" *ngIf="objectService.ReadOnlyControl" color="info" type="button">
							<mat-icon>remove_red_eye</mat-icon>
							<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
						</button>
						<button (click)="Editobject(object)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" *ngIf="objectService.ReadOnlyControl" color="primary" type="button">
							<mat-icon>create</mat-icon>
							<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
						</button>
						<button *ngIf="!object.Locked" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="Lock(object, true)" matTooltip="khóa">
							<mat-icon>lock</mat-icon>
							<span class="button-text">Khóa</span>
						</button>
						<button *ngIf="object.Locked" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="primary" type="button" (click)="Lock(object)" matTooltip="Mở Khóa">
							<mat-icon> lock_open</mat-icon>
							<span class="button-text">Mở khóa</span>
						</button>
						<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="DeleteWorkplace(object)" *ngIf="objectService.ReadOnlyControl" matTooltip="{{ 'COMMON.DELETE' | translate }}">
							<mat-icon>delete</mat-icon>
							<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
						</button>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns; sticky: true"></tr>
				<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns" (click)="row.highlighted = !row.highlighted" [ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></tr>
			</table>

			<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
		</div>
		<!-- start: BOTTOM -->
		<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
			<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
				<mat-chip-list>
					<ng-container *ngFor="let chip of gridService.model.lstChip">
						<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
							{{chip.title}}: {{chip.data}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
						<ng-container *ngIf="chip.type==1">
							<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
								{{chip.title}}: {{item.name}}
								<mat-icon matChipRemove>cancel</mat-icon>
							</mat-chip>
						</ng-container>
					</ng-container>
					<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
						Đặt lại
					</mat-chip>
				</mat-chip-list>
			</div>
			<div class="flt-page" style="width: 50%;">
				<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
				<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
			</div>
		</div>
		<!-- end: BOTTOM -->

	</div>
</kt-portlet>
