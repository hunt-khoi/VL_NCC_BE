<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet" [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			 style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;" *ngIf="allowEdit">
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="{{'COMMON.LUU_DONG' | translate}}">
				<span translate="COMMON.LUU_DONG"></span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
			<button class="hide-view-sm" type="button" mat-raised-button color="primary" (click)="onSubmit(false)" [disabled]="disabledBtn" *ngIf="item.Id == 0" matTooltip="{{'COMMON.LUU_THEMMOI' | translate}}">
				<span translate="COMMON.LUU_TIEPTUC"></span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm">
		<div class="kt-portlet__body">
			<div class="form-group kt-form__group row">
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'CANCU.SO' | translate }}" formControlName="SoCanCu" class="require" required #focusInput />
						<mat-error *ngIf="itemForm.controls['SoCanCu'].errors">
							{{ 'CANCU.SO' | translate }} <strong> bắt buộc nhập</strong>
						</mat-error>
					</mat-form-field>
				</div>
				<div class="col-lg-8 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'CANCU.PhanLoai' | translate }}" formControlName="PhanLoai" />
					</mat-form-field>
				</div>
				<div class="col-lg-12 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<textarea matInput placeholder="{{ 'CANCU.NAME' | translate }}" formControlName="CanCu" class="require" required rows="2"></textarea>
						<mat-error *ngIf="itemForm.controls['CanCu'].errors">
							{{ 'CANCU.NAME' | translate }} <strong> bắt buộc nhập</strong>
						</mat-error>
					</mat-form-field>
				</div>
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'CANCU.CoQuanBanHanh' | translate }}" formControlName="CoQuanBanHanh" />
					</mat-form-field>
				</div>
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'CANCU.NguoiKy' | translate }}" formControlName="NguoiKy" />
					</mat-form-field>
				</div>
				<div class="col-md-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<input matInput placeholder="{{ 'CANCU.NgayBanHanh' | translate }}" formControlName="NgayBanHanh" [matDatepicker]="picker0" [max]="itemForm.controls.NgayBanHanh.value" />
						<mat-datepicker-toggle matSuffix [for]="picker0"></mat-datepicker-toggle>
						<mat-datepicker #picker0></mat-datepicker>
					</mat-form-field>
				</div>
				<div class="col-md-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<input matInput placeholder="{{ 'CANCU.HieuLuc_From' | translate }}" formControlName="HieuLuc_From" [matDatepicker]="picker1" [max]="itemForm.controls.HieuLuc_To.value" />
						<mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
						<mat-datepicker #picker1></mat-datepicker>
					</mat-form-field>
				</div>
				<div class="col-md-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<input matInput placeholder="{{ 'CANCU.HieuLuc_To' | translate }}" formControlName="HieuLuc_To" [matDatepicker]="picker2" [min]="itemForm.controls.HieuLuc_From.value" />
						<mat-datepicker-toggle matSuffix [for]="picker2"></mat-datepicker-toggle>
						<mat-datepicker #picker2 color="primary"></mat-datepicker>
					</mat-form-field>
				</div>
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'COMMON.PRIORITY' | translate }}" formControlName="Priority" type="number" />
						<mat-error *ngIf="itemForm.controls['Priority'].errors">
							Thứ tự <strong> lớn hơn 0</strong>
						</mat-error>
					</mat-form-field>
				</div>
				<div class="col-lg-12 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<textarea matInput placeholder="{{ 'CANCU.TrichYeu' | translate }}" formControlName="TrichYeu" rows="3"></textarea>
					</mat-form-field>
				</div>
				<div class="col-lg-12 m--margin-bottom-20-mobile">
					<dl-image-control formControlName="FileDinhKem" nameButton="Chọn file" [multiple]="false" [disabled]="!allowEdit">
					</dl-image-control>
				</div>
			</div>
		</div>
	</form>
</div>
