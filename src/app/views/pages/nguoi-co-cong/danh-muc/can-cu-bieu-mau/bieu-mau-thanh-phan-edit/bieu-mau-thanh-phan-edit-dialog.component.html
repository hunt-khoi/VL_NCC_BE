<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn"
		title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet"
	[ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile"
			style="margin-top: 10px; text-align: right;" *ngIf="allowEdit">
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn"
				matTooltip="{{'COMMON.LUU_DONG' | translate}}">
				<span translate="COMMON.LUU_DONG"></span>&nbsp;&nbsp;
				<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
			<button type="button" class="hide-view-sm" mat-raised-button color="primary" (click)="onSubmit(false)"
				[disabled]="disabledBtn" *ngIf="item.Id == 0" matTooltip="{{'COMMON.LUU_TIEPTUC' | translate}}">
				<span translate="COMMON.LUU_TIEPTUC"></span>&nbsp;&nbsp;
				<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
		</div>
	</div>
	
	<div class="kt-portlet__body">
		<form class="kt-form" [formGroup]="itemForm">
			<div class="form-group kt-form__group row">
				<div class="col-lg-12 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'BIEUMAU_TP.ThanhPhan' | translate }}" formControlName="ThanhPhan" class="require" required
							#focusInput [readonly]="item.Id>0" />
					</mat-form-field>
				</div>
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'BIEUMAU_TP.DieuKien' | translate }}" formControlName="DieuKien" [readonly]="item.Id>0" />
					</mat-form-field>
				</div>
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput formControlName="NoiDung" placeholder="{{ 'BIEUMAU_TP.NoiDung' | translate }}"
							class="require" required/>
					</mat-form-field>
				</div>
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput formControlName="NoiDungFail" placeholder="{{ 'BIEUMAU_TP.NoiDungFail' | translate }}"
							class="require" required/>
					</mat-form-field>
				</div>
				<div class="col-md-4 kt-margin-bottom-10-mobile">
					<dl-image-control formControlName="fileDinhKem" 
						nameButton="{{ 'BIEUMAU_TP.FileThoa' | translate }}" [multiple]="false" 
						[disabled]="!allowEdit" type=".docx">
					</dl-image-control>
				</div>
				<div class="col-md-4 kt-margin-bottom-10-mobile" style="padding-top:20px;">
					<mat-checkbox formControlName="isFail" disabled>Có trường hợp không thỏa</mat-checkbox>
				</div>
				<div class="col-md-4 kt-margin-bottom-10-mobile" [hidden]="!itemForm.controls['isFail'].value">
					<dl-image-control formControlName="fileDinhKemFail"
						nameButton="{{ 'BIEUMAU_TP.FileKhongThoa' | translate }}" [multiple]="false"
						[disabled]="!allowEdit" type=".docx">
					</dl-image-control>
				</div>
			</div>
		</form>

	</div>
</div>
