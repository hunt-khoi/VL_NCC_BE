<kt-portlet-header [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
	<ng-container ktPortletTitle>
		<div class="kt-form__filtration">
			<h3 class="kt-portlet__head-title">
				<span translate="OBJECT.LIST"  [translateParams]="{name:this._name.toLowerCase()}"></span>
			</h3>
		</div>
	</ng-container>
	<ng-container ktPortletTools>
		<button mat-raised-button (click)="Add()" *ngIf="apiService.ReadOnlyControl"
			matTooltip="{{ 'COMMON.CREATE' | translate }}" color="accent" type="button">
			<span translate="COMMON.CREATE"></span>
		</button>
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</ng-container>
</kt-portlet-header>
<kt-portlet-body>
	<div class="example-container mat-table__wrapper" [ngStyle]="{'overflow-x': gridService.model.haveFilter?'unset':'auto'}">
		<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort #sort1='matSort' matSortActive="Priority"
			style="width: 100%;" matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}" cdkDropListGroup>
			<ng-container matColumnDef="STT">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode">STT</th>
				<td mat-cell class="stt-cell" *matCellDef="let item; let i=index">{{i+1}}</td>
			</ng-container>
			<ng-container matColumnDef="SoLieu">
				<th mat-header-cell *matHeaderCellDef style="flex: 0 0 25%">
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="SoLieu" column_title="Số liệu"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item" style="flex: 0 0 25%">
					<a href="javascript:;" (click)="EditNhom(item, false)">{{item.SoLieu}}</a>
				</td>
			</ng-container>
			<ng-container matColumnDef="Id_LoaiSoLieu">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Id_LoaiSoLieu" column_title="ID Loại số liệu"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item"> {{item.Id_LoaiSoLieu}} </td>
			</ng-container>
			<ng-container matColumnDef="LoaiSoLieu">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center" mat-sort-header>
					Loại số liệu
				</th>
				<td mat-cell *matCellDef="let item" style="flex: 0 0 15%">{{item.LoaiSoLieu}}</td>
			</ng-container>
			<ng-container matColumnDef="MoTa">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center" mat-sort-header>
					Mô tả
				</th>
				<td mat-cell *matCellDef="let item" style="flex: 0 0 15%">{{item.MoTa}}</td>
			</ng-container>
			<ng-container matColumnDef="Locked">
				<th style="white-space: nowrap;" mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Locked" column_title="Tình trạng"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item">
					<span class="kt-badge kt-badge--inline kt-badge--pill kt-badge--wide {{covertLockToColor(item.Locked)}}">
						{{covertLockToString(item.Locked)}}
					</span>
				</td>
			</ng-container>
			<ng-container matColumnDef="Priority">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center" mat-sort-header>Thứ tự</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.Priority}}</td>
			</ng-container>
			<ng-container matColumnDef="CreatedBy">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<span translate="COMMON.CREATED_BY"></span>
				</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.CreatedBy}}</td>
			</ng-container>
			<ng-container matColumnDef="CreatedDate">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<span translate="COMMON.CREATED_DATE"></span>
				</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.CreatedDate}}</td>
			</ng-container>
			<ng-container matColumnDef="UpdatedBy">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<span translate="COMMON.UPDATED_BY"></span>
				</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.UpdatedBy}}</td>
			</ng-container>
			<ng-container matColumnDef="UpdatedDate">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">
					<span translate="COMMON.UPDATED_DATE"></span>
				</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.UpdatedDate}}</td>
			</ng-container>

			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef style="width: 100px;">
					<span translate="COMMON.TACVU"></span>
				</th>
				<td mat-cell *matCellDef="let item" class="action-cell" [ngClass]="list_button ? 'list-button' : ''">
					<button mat-button (click)="Edit(item, false)"  [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl" 
						matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
						<mat-icon>visibility</mat-icon>
						<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
					</button>
					<button mat-button (click)="Edit(item)" [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl"
						matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button">
						<mat-icon>create</mat-icon>
						<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
					</button>
					<button mat-button (click)="Block(item)" [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl && !item.Locked"
						matTooltip="Khóa" color="warn" type="button">
						<mat-icon>{{covertLockButton(item.Locked)}}</mat-icon>
						<span class="button-text">{{ covertToolTip(item.Locked) | translate }}</span>
					</button>
					<button mat-button (click)="Block(item)" [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl && item.Locked"
						matTooltip="Mở khóa" color="primary" type="button">
						<mat-icon>{{covertLockButton(item.Locked)}}</mat-icon>
						<span class="button-text">{{ covertToolTip(item.Locked) | translate }}</span>
					</button>
					<button mat-button (click)="Delete(item)" [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl"
						matTooltip="{{ 'COMMON.DELETE' | translate }}" color="warn" type="button">
						<mat-icon>delete</mat-icon>
						<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
					</button>
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns"></tr>
			<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns"></tr>
		</table>
		<div class="mat-table__message" *ngIf="!dataSource.hasItems">{{'COMMON.NO_RECORD_FOUND'|translate}}</div>
	</div>

	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
			<kt-chip-filter [gridService]="gridService"></kt-chip-filter>
		</div>
		<div class="flt-page" style="width: 50%;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]"
				[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true">
			</mat-paginator>
		</div>
	</div>
</kt-portlet-body>
