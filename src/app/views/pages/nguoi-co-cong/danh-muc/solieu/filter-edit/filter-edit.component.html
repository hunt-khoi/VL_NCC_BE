<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet" [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.id_row == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			 style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.id_row == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;" *ngIf="allowEdit">
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="{{'COMMON.LUU_DONG' | translate}}">
				<span translate="COMMON.LUU_DONG"></span>&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
			<button type="button" mat-raised-button color="primary" (click)="onSubmit(false)" [disabled]="disabledBtn" *ngIf="item.id_row == 0" matTooltip="{{'COMMON.LUU_THEMMOI' | translate}}">
				<span translate="COMMON.LUU_THEMMOI"></span>&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm">
		<div class="kt-portlet__body">
			<div class="row">
				<div class="col-md-12 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="Bộ trích xuất" class="require" required
							   formControlName="title" />
					</mat-form-field>
				</div>
				<div class="col-md-4 kt-margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<mat-select formControlName="bang" class="require" required placeholder="Nguồn dữ liệu" (selectionChange)="changebang($event.value);listColumn=[];">
							<mat-option [value]="opt.id" *ngFor="let opt of list_bang">
								{{opt.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-md-4 kt-margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<mat-select formControlName="pheptoan" class="require" required placeholder="Phép toán">
							<mat-option [value]="opt.id" *ngFor="let opt of list_pheptoan">
								{{opt.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
			</div>
			<div class="row align-items-center">
				<div class="col-md-12 kt-margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<mat-select [(value)]="filter_key" formControlName="loai"
							(selectionChange)="FilterChange($event.value)" class="require" required placeholder="Điều kiện">
							<ng-container *ngFor="let item of list_filter_key">
								<mat-option [value]="item.id_row" *ngIf="!item.Selected">
									{{item.title}}
								</mat-option>
							</ng-container>
						</mat-select>
					</mat-form-field>
				</div>
			</div>
			<div class="row align-items-center" *ngIf="show_operators">
				<div class="col-md-4 kt-margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<mat-select [(value)]="filter_operators" formControlName="operators" class="require" required
							(selectionChange)="Filter_operators($event.value)" placeholder="Phép toán">
							<mat-option *ngFor="let operator of list_operators" [value]="operator.id">
								{{operator.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div *ngIf="show_option_1" class="col-md-4 kt-margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<mat-select [(value)]="filter_options" formControlName="options" class="require" required
							(selectionChange)="Filter_Options($event.value)" placeholder="Giá trị">
							<mat-option *ngFor="let item of list_options" [value]="item.id">
								{{item.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div *ngIf="show_option_2" class="col-md-4 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<input matInput placeholder="Title" formControlName="title_input" class="require" required>
					</mat-form-field>
				</div>
				<div *ngIf="show_option_3" class="col-md-4 kt--margin-bottom-10-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<input matInput [matDatepicker]="dttg" placeholder="Chọn thời gian"
							   formControlName="time" class="require" id="thoigian">
						<mat-datepicker-toggle matSuffix [for]="dttg"></mat-datepicker-toggle>
						<mat-datepicker #dttg></mat-datepicker>
					</mat-form-field>
				</div>
				<div class="col-md-2 kt--margin-bottom-10-mobile">
					<button type="button" mat-raised-button color="primary" (click)="addcot()">
						<i style="color: #FFFFFF;" class="fa fa-plus"></i>&nbsp;Thêm
					</button>
				</div>
			</div>
			<div style="display: flex;" *ngFor="let list of listColumn;  let i = index">
				<div class="text-center" style="width:50px">
					<i class="fa fa-plus"></i>&nbsp;
				</div>
				<div style="flex-grow: 1;">
					<span [innerHtml]="listColumn[i].StrTitle"></span>
				</div>
				<div class="text-right" style="width:100px">
					<button mat-icon-button color="warn" type="button" (click)="remove(i)">
						<mat-icon style="display: table-caption;">clear</mat-icon>
					</button>
				</div>
			</div>
		</div>
	</form>
</div>
