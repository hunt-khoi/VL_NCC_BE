<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet" [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			 style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;" *ngIf="allowEdit">
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="{{'COMMON.LUU_DONG' | translate}}">
				<span translate="COMMON.LUU_DONG"></span>&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
			<button type="button" class="hide-view-625" mat-raised-button color="primary" (click)="onSubmit(false)" [disabled]="disabledBtn" *ngIf="item.Id == 0" matTooltip="{{'COMMON.LUU_THEMMOI' | translate}}">
				<span translate="COMMON.LUU_THEMMOI"></span>&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm">
		<div class="kt-portlet__body">
			<kt-alert *ngIf="hasFormErrors" type="warn" [duration]="0" [showCloseButton]="true" (close)="onAlertClose($event)">
				Không thể lưu, vui lòng kiểm tra lại thông tin!
			</kt-alert>

			<div class="form-group kt-form__group row">
				<div class="col-lg-8 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'SO_LIEU.NAME' | translate }}" formControlName="SoLieu"
							   class="require" required #focusInput />
					</mat-form-field>
				</div>
				
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput type="number" placeholder="Thứ tự" formControlName="Priority"/>
					</mat-form-field>
					<mat-error *ngIf = "hasFormErrors">
						<span *ngIf="itemForm.controls.Priority.value === '' || itemForm.controls.Priority.value < 0">
							Thứ tự
						</span>
						<strong
							*ngIf="itemForm.controls.Priority.value === ''">
							bắt buộc nhập
						</strong>
						<strong *ngIf="itemForm.controls.Priority.value < 0">
							bắt buộc không phải là số âm
						</strong>
					</mat-error>
				</div>

            </div>
            <div class="form-group kt-form__group row">
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select formControlName="Id_LoaiSoLieu" placeholder="{{'SO_LIEU.loaisolieu' | translate }}" (selectionChange)="loadSLCha()" required class="require">
							<mat-option *ngFor="let opt of listLoaiSoLieu;" [value]="opt.id">{{opt.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select formControlName="Id_Filter" placeholder="Trích xuất từ">
							<mat-option>
								<ngx-mat-select-search [placeholderLabel]="'Tìm kiếm...'" [noEntriesFoundLabel]="'Không tìm thấy kết quả phù hợp'" [(ngModel)]="FilterCtrl" [ngModelOptions]="{standalone: true}" (ngModelChange)="filter()">
								</ngx-mat-select-search>
							</mat-option>
							<mat-option [value]="0" selected>-- Chọn --</mat-option>
							<mat-option *ngFor="let opt of listFilter | async;" [value]="opt.id" title="{{opt.title}}">
								{{opt.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>

				<div class="col-lg-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid " *ngIf="listSLCons.length == 0">
						<mat-select formControlName="Id_SoLieuParent" placeholder="Số liệu cha">
							<mat-option>
								<ngx-mat-select-search [placeholderLabel]="'Tìm kiếm...'" [noEntriesFoundLabel]="'Không tìm thấy kết quả phù hợp'" [(ngModel)]="FilterCtrl1" [ngModelOptions]="{standalone: true}" (ngModelChange)="filter1()">
								</ngx-mat-select-search>
							</mat-option>
							<mat-option [value]="0" selected>-- Chọn --</mat-option>
							<mat-option *ngFor="let opt of listSLCha | async;" [value]="opt.Id" title="{{opt.SoLieu}}">
								{{opt.SoLieu}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-lg-12 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<textarea matInput rows="3" placeholder="{{ 'SO_LIEU.mota' | translate }}" 
							formControlName="MoTa"></textarea>
					</mat-form-field>
                </div>
                
			</div>
			
			<div class="form-group kt-form__group row" *ngIf="listSLCons.length > 0">
				<p>Danh sách các số liệu con</p>
				<table class="table-bordered table-sm" style="width:100%;">
					<tr>
						<th>STT</th>
						<th>Tên số liệu</th>
					</tr>
					
						<ng-container *ngFor="let item of listSLCons; let i=index">
							<tr>
								<td>{{i+1}}</td>
							<td>{{item.SoLieu}}</td>
							</tr>
							
						</ng-container>
					
				</table>
			</div>
		</div>
	</form>
</div>
