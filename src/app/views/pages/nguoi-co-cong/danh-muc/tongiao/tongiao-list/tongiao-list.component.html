<kt-portlet [options]="{headLarge: true}">
	<kt-portlet-header [sticky]="true" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTitle>
			<div class="kt-form__filtration">
				<h3 class="kt-portlet__head-title">
					<span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span>
				</h3>
			</div>
		</ng-container>
		<ng-container ktPortletTools>
			<button (click)="Add()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="apiService.ReadOnlyControl" color="accent" type="button">
				<span translate="COMMON.CREATE"></span>
			</button>
		</ng-container>
	</kt-portlet-header>

	<div class="kt-portlet__body">
		<div class="mat-table__wrapper">
			<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="Priority" matSortDirection="asc" matSortDisableClear>
				<ng-container matColumnDef="Id_row">
					<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode stt-cell" style="flex: 0 0 10%">{{'COMMON.STT'|translate}}</th>
					<td mat-cell *matCellDef="let tongiao;let i=index" class="mat-column-vinCode stt-cell" style="flex: 0 0 10%">{{i+1}}</td>
				</ng-container>
				<ng-container matColumnDef="Tentongiao">
					<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode" style="flex: 0 0 50%">
						<span translate="TONGIAO.tentongiao"></span>
					</th>
					<td mat-cell *matCellDef="let item" class="mat-column-vinCode" style="flex: 0 0 50%">
						<a href="javascript:;" (click)="Update(item, false)">{{item.Tentongiao}}</a>
					</td>
				</ng-container>
				<ng-container matColumnDef="Priority">
					<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode">Thứ tự</th>
					<td mat-cell *matCellDef="let item" class="mat-column-vinCode">{{item.Priority}}</td>
				</ng-container>
				<ng-container matColumnDef="NguoiCapNhat">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_BY"></span></th>
					<td mat-cell *matCellDef="let item">{{item.NguoiCapNhat}}</td>
				</ng-container>
				<ng-container matColumnDef="NgayCapNhat">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_DATE"></span></th>
					<td mat-cell *matCellDef="let item">{{item.NgayCapNhat | date: 'dd/MM/yyyy HH:mm' }}</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style=" width: 100px;">
						<span translate="COMMON.TACVU"></span>
					</th>
					<td mat-cell *matCellDef="let item" class="action-cell" [ngClass]="list_button?'list-button':''">
						<ng-container *ngIf="apiService.ReadOnlyControl">
							<button mat-button (click)="Update(item, false)" [ngClass]="btnClass" 
								matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
								<mat-icon>visibility</mat-icon>
								<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
							</button>
							<button mat-button (click)="Update(item)" [ngClass]="btnClass" 
								matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button">
								<mat-icon>create</mat-icon>
								<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
							</button>
							<button mat-button (click)="Delete(item)" [ngClass]="btnClass" 
								matTooltip="{{ 'COMMON.DELETE' | translate }}" color="warn" type="button">
								<mat-icon>delete</mat-icon>
								<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
							</button>
						</ng-container>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
				<tr mat-row *matRowDef="let row; columns: displayedColumns" (click)="row.highlighted = !row.highlighted"
					[ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false">
				</tr>
			</table>
			<div class="mat-table__message" *ngIf="!dataSource.hasItems">{{'COMMON.NO_RECORD_FOUND'|translate}}</div>
		</div>

		<div class="mat-table__bottom" style="margin-top: 1px;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" 
				[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true">
			</mat-paginator>
		</div>
	</div>
</kt-portlet>
