<style>
	.dt-overflow {
		overflow: hidden;
		line-height: 2rem;
		max-height: 8rem;
		-webkit-box-orient: vertical;
		display: block;
		display: -webkit-box;
		overflow: hidden !important;
		text-overflow: ellipsis;
		-webkit-line-clamp: 2;
		max-width: 300px;
	}
</style>
<kt-portlet-header [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
	<ng-container ktPortletTitle>
		<div class="kt-form__filtration">
			<h3 class="kt-portlet__head-title">
				<span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span>
			</h3>
		</div>
	</ng-container>
	<ng-container ktPortletTools>
		<button mat-raised-button (click)="UpdateMucQua()" *ngIf="apiService.ReadOnlyControl" 
			matTooltip="Cập nhật mức quà cho nhiều đối tượng" color="accent" type="button">
			Cập nhật mức quà
		</button>
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</ng-container>
</kt-portlet-header>

<div class="kt-portlet__body">
	<div class="mat-table__wrapper">
		<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="Priority" 
			matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}">
			<ng-container matColumnDef="STT">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode"><span translate="COMMON.STT"></span></th>
				<td mat-cell *matCellDef="let item; let vi = index" class="mat-column-vinCode">{{vi + 1}}</td>
			</ng-container>
			<ng-container matColumnDef="DoiTuong">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter enable_sort="true" [gridService]="gridService" column_name="DoiTuong" [column_title]="_DOITUONG"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item">
					<a href="javascript:;" (click)="update(item, false)" >
						<div class="dt-overflow" title="{{item.DoiTuong}}">{{item.DoiTuong}}</div>
					</a></td>
			</ng-container>
			<ng-container matColumnDef="MaDoiTuong">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" column_name="MaDoiTuong" [column_title]="_MADOITUONG"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item">{{item.MaDoiTuong}}</td>
			</ng-container>
			<ng-container matColumnDef="Locked">
				<th style="white-space: nowrap;" mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Locked" [column_title]="_LOCKED"></kt-column-filter>
				</th>
				<td mat-cell class="m--padding-10" style="white-space: nowrap; text-align: left" *matCellDef="let item">
					<span class="kt-badge kt-badge--inline kt-badge--pill kt-badge--wide {{getItemCssClassByStatus(item.Locked)}}">
						{{getItemStatusString(item.Locked)}}
					</span>
				</td>
			</ng-container>

			<ng-container matColumnDef="Priority">
				<th mat-header-cell *matHeaderCellDef mat-sort-header><span translate="DOITUONG_NCC.PRIORITY"></span></th>
				<td mat-cell *matCellDef="let item">{{item.Priority}}</td>
			</ng-container>
			<ng-container *ngFor="let nh of listNhomLeTet; let i=index">
				<ng-container *ngFor="let ng of listNguon; let j=index">
					<ng-container matColumnDef="Nhom{{i}}{{j}}">
						<th mat-header-cell *matHeaderCellDef>{{nh.title}} - {{ng.title}}</th>
						<td mat-cell *matCellDef="let item">{{getvalue(item,nh.id, ng.id)}}</td>
					</ng-container>
				</ng-container>
			</ng-container>

			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef style="width: 50px;">
					<span translate="COMMON.TACVU"></span>
				</th>
				<td mat-cell *matCellDef="let item"  class="action-cell" [ngClass]="list_button ? 'list-button' : ''">
					<button mat-button (click)="update(item)" [ngClass]="btnClass" *ngIf="apiService.ReadOnlyControl"
						matTooltip="Cập nhật mức quà" color="primary" type="button">
						<mat-icon>settings</mat-icon>
						<span class="button-text">Cập nhật mức quà</span>
					</button>
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns; sticky: true"></tr>
			<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns" (click)="row.highlighted = !row.highlighted" 
				[ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false">
			</tr>
		</table>
		<div class="mat-table__message" *ngIf="!dataSource.hasItems">{{'COMMON.NO_RECORD_FOUND'|translate}}</div>
	</div>
	
	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
			<kt-chip-filter [gridService]="gridService"></kt-chip-filter>
		</div>
		<div class="flt-page" style="width: 50%;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" 
				[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true">
			</mat-paginator>
		</div>
	</div>
</div>
