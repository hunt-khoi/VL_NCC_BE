<style>

	.dt-overflow {
		overflow: hidden;
		line-height: 2rem;
		max-height: 8rem;
		-webkit-box-orient: vertical;
		display: block;
		display: -webkit-box;
		overflow: hidden !important;
		text-overflow: ellipsis;
		-webkit-line-clamp: 2;
		max-width: 500px;
	}
</style>
<kt-portlet-header [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
	<ng-container ktPortletTitle>
		<div class="kt-form__filtration">
			<h3 class="kt-portlet__head-title"><span translate="OBJECT.LIST" [translateParams]="{name:this._name.toLowerCase()}"></span></h3>
		</div>
	</ng-container>
	<ng-container ktPortletTools>
		<kt-column-option [gridService]="gridService"></kt-column-option>
	</ng-container>
</kt-portlet-header>

<div class="kt-portlet__body">
	<div class="mat-table__wrapper">
		<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="Priority" 
			matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}">
			<ng-container matColumnDef="STT">
				<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode"><span translate="COMMON.STT"></span></th>
				<td mat-cell *matCellDef="let item;let vi = index" class="mat-column-vinCode">{{vi + 1}}</td>
			</ng-container>
			<ng-container matColumnDef="Id">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center">ID</th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.Id}}</td>
			</ng-container>
			<ng-container matColumnDef="DoiTuong">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter enable_sort="true" [gridService]="gridService" column_name="DoiTuong" [column_title]="_DOITUONG"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item">
					<a href="javascript:;" (click)="Editdoituongnguoicocong(item, false)">
						<div class=" dt-overflow" title="{{item.DoiTuong}}">{{item.DoiTuong}}</div>
					</a>
				</td>
			</ng-container>
			<ng-container matColumnDef="MaDoiTuong">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter enable_sort="true" [gridService]="gridService" column_name="MaDoiTuong" [column_title]="_MADOITUONG"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item">{{item.MaDoiTuong}}</td>
			</ng-container>
			<ng-container matColumnDef="MoTa">
				<th mat-header-cell *matHeaderCellDef>
					<kt-column-filter enable_sort="true" [gridService]="gridService" column_name="MoTa" [column_title]="_MOTA"></kt-column-filter>
				</th>
				<td mat-cell *matCellDef="let item">{{item.MoTa}}</td>
			</ng-container>
			<ng-container matColumnDef="Locked">
				<th style="white-space: nowrap;" mat-header-cell *matHeaderCellDef>
					<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Locked" [column_title]="_LOCKED"></kt-column-filter>
				</th>
				<td mat-cell [ngClass]="{'m--padding-10': true}" style="white-space: nowrap; text-align: left" *matCellDef="let item">
					<span class="kt-badge kt-badge--inline kt-badge--pill kt-badge--wide {{getItemCssClassByStatus(item.Locked)}}">{{getItemStatusString(item.Locked)}}</span>
				</td>
			</ng-container>
			<ng-container matColumnDef="Priority">
				<th mat-header-cell *matHeaderCellDef mat-sort-header><span translate="DOITUONG_NCC.PRIORITY"></span></th>
				<td mat-cell *matCellDef="let item">{{item.Priority}}</td>
			</ng-container>
			<ng-container matColumnDef="CreatedBy">
				<th mat-header-cell *matHeaderCellDef><span translate="DOITUONG_NCC.CREATEDBY"></span></th>
				<td mat-cell *matCellDef="let item">{{item.CreatedBy}}</td>
			</ng-container>
			<ng-container matColumnDef="CreatedDate">
				<th mat-header-cell *matHeaderCellDef style="justify-content: center"><span translate="DOITUONG_NCC.CREATEDDATE"></span></th>
				<td mat-cell *matCellDef="let item" style="justify-content: center">{{item.CreatedDate }}</td>
			</ng-container>
			<ng-container matColumnDef="UpdatedBy">
				<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_BY"></span></th>
				<td mat-cell *matCellDef="let item">{{item.UpdatedBy}}</td>
			</ng-container>
			<ng-container matColumnDef="UpdatedDate">
				<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_DATE"></span></th>
				<td mat-cell *matCellDef="let item">{{item.UpdatedDate }}</td>
			</ng-container>

			<ng-container matColumnDef="actions">
				<th mat-header-cell *matHeaderCellDef style="width: 175px;">
					<span translate="COMMON.TACVU"></span>
				</th>
				<td mat-cell *matCellDef="let item " class="action-cell" [ngClass]="list_button?'list-button':''">
					<button (click)="Editdoituongnguoicocong(item, false)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.DETAIL' | translate }}" *ngIf="objectService.ReadOnlyControl" color="info" type="button">
						<mat-icon>remove_red_eye</mat-icon>
						<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
					</button>
					<!-- <button (click)="Editdoituongnguoicocong(item)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" *ngIf="objectService.ReadOnlyControl" color="primary" type="button">
						<mat-icon>create</mat-icon>
						<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
					</button>
					<button *ngIf="!item.Locked" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="Lock(item, true)" matTooltip="khóa">
						<mat-icon>lock</mat-icon>
						<span class="button-text">Khóa</span>
					</button>
					<button *ngIf="item.Locked" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="primary" type="button" (click)="Lock(item)" matTooltip="Mở Khóa">
						<mat-icon> lock_open</mat-icon>
						<span class="button-text">Mở khóa</span>
					</button>
					<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="Cập nhật biểu mẫu" color="primary" (click)="UpdateBieuMau(item)" *ngIf="objectService.ReadOnlyControl">
						<mat-icon>settings</mat-icon>
						<span class="button-text">Cập nhật biểu mẫu</span>
					</button> -->
				</td>
			</ng-container>

			<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns; sticky: true"></tr>
			<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns" (click)="row.highlighted = !row.highlighted" [ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></tr>
		</table>

		<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
	</div>
	<!-- start: BOTTOM -->
	<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
		<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
			<mat-chip-list>
				<ng-container *ngFor="let chip of gridService.model.lstChip">
					<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
						{{chip.title}}: {{chip.data}}
						<mat-icon matChipRemove>cancel</mat-icon>
					</mat-chip>
					<ng-container *ngIf="chip.type==1">
						<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
							{{chip.title}}: {{item.name}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
					</ng-container>
				</ng-container>
				<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
					Đặt lại
				</mat-chip>
			</mat-chip-list>
		</div>
		<div class="flt-page" style="width: 50%;">
			<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
			<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
		</div>
	</div>
	<!-- end: BOTTOM -->
</div>
