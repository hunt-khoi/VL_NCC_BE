<kt-portlet>
	<kt-portlet-header [sticky]="true" [title]="'Danh sách vai trò'" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTools>
			<!-- <button (click)="add()" mat-raised-button color="primary" matTooltip="Thêm mới vai trò" [disabled]="disabledBtn">Thêm mới</button> -->
			<kt-column-option [gridService]="gridService"></kt-column-option>
		</ng-container>
	</kt-portlet-header>

	<kt-portlet-body>
		<div class="kt-form__filtration">
			<div class="row align-items-center">
				<div class="col-md-4 kt-margin-bottom-10-mobile">
					<m-dropdown-tree [data]="datatree" [FieldTitle]="'title'" [FieldId]="'id'" [FieldChildren]="'data'" 
						[DropdownTitle]="'Đơn vị'" (SelectedItemTree)="GetValueNode($event)"></m-dropdown-tree>
				</div>
			</div>
		</div>
		<div class="mat-table__wrapper d-block" [ngStyle]="{'overflow-x': gridService.model.haveFilter?'unset':'auto'}" >
			<table mat-table class="lmat-elevation-z8" [ngClass]="{'dl-table-flt': gridService.model.haveFilter}" #table [dataSource]="dataSource" 
				matSort #sort1="matSort" matSortActive="DisplayOrder" matSortDirection="asc" matSortDisableClear cdkDropListGroup>
				<ng-container matColumnDef="STT">
					<th mat-header-cell *matHeaderCellDef class="stt-cell">STT</th>
					<td mat-cell class="stt-cell" *matCellDef="let i=index">{{i + 1}}</td>
				</ng-container>
				<ng-container matColumnDef="GroupName">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="GroupName" column_title="Tên vai trò"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">
						<a href="javascript:;" (click)="edit(item, false)">{{item.GroupName}}</a>
					</td>
				</ng-container>
				<ng-container matColumnDef="Ma">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Ma" column_title="Mã vai trò"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">{{item.Ma}}</td>
				</ng-container>
				<ng-container matColumnDef="GhiChu">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="GhiChu" column_title="Mô tả"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">{{item.GhiChu}}</td>
				</ng-container>
				<ng-container matColumnDef="DisplayOrder">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Thứ tự</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">{{item.DisplayOrder}}</td>
				</ng-container>
				<ng-container matColumnDef="Locked">
					<th style="white-space: nowrap;" mat-header-cell *matHeaderCellDef>
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Locked" column_title="Tình trạng"></kt-column-filter>
					</th>
					<td mat-cell class="m--padding-10" style="white-space: nowrap; text-align: left" *matCellDef="let item">
						<span class="kt-badge kt-badge--inline kt-badge--pill kt-badge--wide {{getItemCssClassByStatus(item.Locked)}}">
							{{getItemStatusString(item.Locked)}}
						</span>
					</td>
				</ng-container>
				<ng-container matColumnDef="ModifiedDate">
					<th mat-header-cell *matHeaderCellDef>Lần cập nhật cuối</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">{{item.ModifiedDate}}</td>
				</ng-container>
				<ng-container matColumnDef="ModifiedBy">
					<th mat-header-cell *matHeaderCellDef>Người cập nhật cuối</th>
					<td mat-cell class="m--padding-10" *matCellDef="let item">{{item.ModifiedBy}}</td>
				</ng-container>
			
				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style="width: 100px">
						Thao tác
					</th>
					<td mat-cell *matCellDef="let item" class="action-cell" [ngClass]="list_button ? 'list-button' : ''">
						<button mat-button (click)="edit(item, false)" [ngClass]="btnClass" 
							matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
							<mat-icon>visibility</mat-icon>
							<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
						</button>
						<ng-container *ngIf="rR.r13">
							<button mat-button (click)="edit(item)" [ngClass]="btnClass" 
								matTooltip="{{ 'COMMON.UPDATE' | translate }}" color="primary" type="button">
								<mat-icon>create</mat-icon>
								<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
							</button>
							<button mat-button (click)="lock(item, false)" [ngClass]="btnClass" *ngIf="item.Locked"  
								matTooltip="Mở khóa vai trò" color="primary" type="button">
								<mat-icon>lock_open</mat-icon>
								<span class="button-text">Mở khóa</span>
							</button>
							<button mat-button (click)="lock(item)" [ngClass]="btnClass" *ngIf="!item.Locked"
								matTooltip="Khóa vai trò" color="warn" type="button">
								<mat-icon>lock</mat-icon>
								<span class="button-text">Khóa</span>
							</button>
							<button mat-button (click)="delete(item)" [ngClass]="btnClass" 
							 	matTooltip="{{ 'COMMON.DELETE' | translate }}" color="warn" type="button">
								<mat-icon>delete</mat-icon>
								<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
							</button>
						</ng-container>
						<button mat-button (click)="phanquyen(item)" [ngClass]="btnClass" [hidden]="!rR.r23"
						 	matTooltip="Phân quyền cho vai trò" color="primary" type="button">
							<mat-icon>settings</mat-icon>
							<span class="button-text">Phân quyền</span>
						</button>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns"></tr>
				<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns"></tr>
			</table>
			<div class="mat-table__message" *ngIf="!dataSource.hasItems">{{'COMMON.NO_RECORD_FOUND'|translate}}</div>
		</div>

		<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
			<div class="flt-selected" *ngIf="gridService.model.haveFilter">
				<kt-chip-filter [gridService]="gridService"></kt-chip-filter>
			</div>
			<div class="flt-page">
				<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
				<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50]" 
					[length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true">
				</mat-paginator>
			</div>
		</div>
	</kt-portlet-body>
</kt-portlet>
