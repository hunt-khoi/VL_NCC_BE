<kt-portlet [options]="{headLarge: true}">
	<kt-portlet-header [sticky]="true" [class]="'kt-portlet__head--lg'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTitle>
			<div class="kt-form__filtration">
				<h3 class="kt-portlet__head-title">
					<span translate="OBJECT.LIST"  [translateParams]="{name:this._name.toLowerCase()}"></span>
				</h3>
			</div>
		</ng-container>
		<ng-container ktPortletTools>
			<button (click)="AddWorkplace()" mat-raised-button matTooltip="{{ 'COMMON.CREATE' | translate }}" *ngIf="objectService.ReadOnlyControl" color="accent" type="button">
				<span translate="COMMON.CREATE"></span>
			</button>
			<button (click)="Export()" mat-raised-button color="info" matTooltip="Export">
				<span>Export</span>
			</button>
			<kt-column-option [gridService]="gridService"></kt-column-option>
		</ng-container>
	</kt-portlet-header>

	<div class="kt-portlet__body">
		<div class="mat-table__wrapper" [ngStyle]="{'overflow-x': gridService.model.haveFilter?'unset':'auto'}">
			<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource"
			    style="width: 100%;" matSort matSortActive="MauSoLieu" matSortDirection="asc" matSortDisableClear [ngClass]="{'dl-table-flt': gridService.model.haveFilter}" cdkDropListGroup>
				<ng-container matColumnDef="select">
					<th mat-header-cell *matHeaderCellDef class="mat-column-checkbox stt-cell" style="padding-right: 20px;">
						<mat-checkbox (change)="$event ? masterToggle() : null" [checked]="selection.hasValue() && isAllSelected()" [indeterminate]="selection.hasValue() && !isAllSelected()" [color]="'primary'" [disabled]="thaotac==0">
						</mat-checkbox>
					</th>
					<td mat-cell *matCellDef="let row" class="mat-column-checkbox" style="padding-right: 20px;">
						<mat-checkbox (click)="$event.stopPropagation()" (change)="$event ? selection.toggle(row) : null" [checked]="selection.isSelected(row)" [color]="'primary'" [disabled]="thaotac==0 || (thaotac==1 && !row.visibleGuiDuyet) || (thaotac==2 && !row.visibleThuHoi)">
						</mat-checkbox>
					</td>
				</ng-container>
				<ng-container matColumnDef="STT">
					<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell"><span translate="COMMON.STT"></span></th>
					<td mat-cell *matCellDef="let object;let vi = index" class="mat-column-vinCode">{{vi + 1}}</td>
				</ng-container>
				<ng-container matColumnDef="MauSoLieu">
					<th mat-header-cell *matHeaderCellDef>
						<kt-column-filter enable_sort="true" [gridService]="gridService" column_name="MauSoLieu" column_title="Mẫu số liệu"></kt-column-filter>
					</th>
					<td mat-cell *matCellDef="let object">{{object.MauSoLieu}}</td>
				</ng-container>

				<ng-container matColumnDef="Status">
					<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode">
						<kt-column-filter [gridService]="gridService" enable_sort="true" column_name="Status" column_title="Tình trạng"></kt-column-filter>
					</th>
					<td mat-cell *matCellDef="let object">
						<span class="kt-badge kt-badge--inline kt-badge--pill 
							kt-badge--wide kt-badge--{{getStatusString(object.Status)}}">{{getItemStatusString(object.Status)}}</span>
					</td>
				</ng-container>
				<ng-container matColumnDef="Nam">
					<th mat-header-cell *matHeaderCellDef mat-sort-header>Năm</th>
					<td mat-cell *matCellDef="let object" >{{object.Nam}}</td>
				</ng-container>
				<ng-container matColumnDef="DonVi">
					<th mat-header-cell *matHeaderCellDef>Đơn vị</th>
					<td mat-cell *matCellDef="let object" >{{object.DonVi}}</td>
				</ng-container>
				<ng-container matColumnDef="CreatedBy">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.CREATED_BY"></span></th>
					<td mat-cell *matCellDef="let item">{{item.CreatedBy}}</td>
				</ng-container>
				<ng-container matColumnDef="CreatedDate">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.CREATED_DATE"></span></th>
					<td mat-cell *matCellDef="let item">{{item.CreatedDate}}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedBy">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_BY"></span></th>
					<td mat-cell *matCellDef="let item">{{item.UpdatedBy}}</td>
				</ng-container>
				<ng-container matColumnDef="UpdatedDate">
					<th mat-header-cell *matHeaderCellDef><span translate="COMMON.UPDATED_DATE"></span></th>
					<td mat-cell *matCellDef="let item">{{item.UpdatedDate }}</td>
				</ng-container>

				<ng-container matColumnDef="actions">
					<th mat-header-cell *matHeaderCellDef style="width: 180px;">
						<span translate="COMMON.TACVU"></span>
					</th>
					<td mat-cell *matCellDef="let object" class="action-cell" [ngClass]="list_button?'list-button':''">
						<button (click)="EditObject(object, false)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.DETAIL' | translate }}" color="info" type="button">
							<mat-icon>remove_red_eye</mat-icon>
							<span class="button-text">{{ 'COMMON.DETAIL' | translate }}</span>
						</button>
						<button (click)="EditObject(object)" mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" matTooltip="{{ 'COMMON.UPDATE' | translate }}" *ngIf="objectService.ReadOnlyControl && object.AllowEdit" color="primary" type="button">
							<mat-icon>create</mat-icon>
							<span class="button-text">{{ 'COMMON.UPDATE' | translate }}</span>
						</button>
						<ng-container *ngIf="filterStatus!=2">
							<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="DeleteWorkplace(object)" *ngIf="objectService.ReadOnlyControl && object.AllowEdit " matTooltip="{{ 'COMMON.DELETE' | translate }}">
								<mat-icon>delete</mat-icon>
								<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
							</button>
							<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" (click)="ThuHoi(object)" type="button" *ngIf="object.visibleThuHoi" matTooltip="Thu hồi">
								<mat-icon>undo</mat-icon>
								<span class="button-text">Thu hồi</span>
							</button>
							<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="accent" (click)="GuiDuyet(object)" type="button" *ngIf="object.visibleGuiDuyet" matTooltip="Gửi duyệt">
								<mat-icon>send</mat-icon>
								<span class="button-text">Gửi duyệt</span>
							</button>
						</ng-container>
						<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" color="warn" type="button" (click)="DeleteWorkplace(object)" *ngIf="object.Status==-2 " matTooltip="{{ 'COMMON.DELETE' | translate }}">
							<mat-icon>delete</mat-icon>
							<span class="button-text">{{ 'COMMON.DELETE' | translate }}</span>
						</button>
						<button mat-button [class.mat-raised-button]="list_button" [class.mat-icon-button]="!list_button" type="button" (click)="Duyet(object,false)" matTooltip="Thảo luận" color="primary" *ngIf="object.Status!=0">
							<mat-icon>insert_comment</mat-icon>
							<span class="button-text">Thảo luận</span>
						</button>
					</td>
				</ng-container>

				<tr mat-header-row *matHeaderRowDef="gridService.model.displayedColumns; sticky: true"></tr>
				<tr mat-row *matRowDef="let row; columns: gridService.model.displayedColumns" (click)="row.highlighted = !row.highlighted" [ngClass]="{hovered: row.hovered, highlighted: row.highlighted}" (mouseover)="row.hovered = true" (mouseout)="row.hovered = false"></tr>
			</table>

			<div class="mat-table__message" *ngIf="!dataSource.hasItems"><span translate="COMMON.NO_RECORD_FOUND"></span></div>
		</div>

		<!-- start: BOTTOM -->
		<div class="mat-table__bottom" [ngClass]="{'exist-flt': gridService.model.haveFilter}">
			<div class="flt-selected" *ngIf="gridService.model.haveFilter" style="max-width:50%;">
				<mat-chip-list>
					<ng-container *ngFor="let chip of gridService.model.lstChip">
						<mat-chip removable="true" *ngIf="chip.type==2" (removed)="gridService.removeText(chip.key)">
							{{chip.title}}: {{chip.data}}
							<mat-icon matChipRemove>cancel</mat-icon>
						</mat-chip>
						<ng-container *ngIf="chip.type==1">
							<mat-chip *ngFor="let item of chip.data" removable="true" (removed)="gridService.remove(item,chip.key);gridService.showClearAllButton()">
								{{chip.title}}: {{item.name}}
								<mat-icon matChipRemove>cancel</mat-icon>
							</mat-chip>
						</ng-container>
					</ng-container>
					<mat-chip class="flt-clear" color="primary" removable="true" *ngIf="gridService.model.isClearAll" (click)="gridService.Clear()">
						Đặt lại
					</mat-chip>
				</mat-chip-list>
			</div>
			<div class="flt-page" style="width: 50%;">
				<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
				<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 50, 100]" [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
			</div>
		</div>
		<!-- end: BOTTOM -->
	</div>
</kt-portlet>
