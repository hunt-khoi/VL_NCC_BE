<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet" [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile" style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;">
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" matTooltip="{{'COMMON.LUU_DONG' | translate}}" *ngIf="item.Id_Detail>0">
				<span translate="COMMON.LUU_DONG"></span>&nbsp;&nbsp;<div class="spinner-button-pad"></div>
			</button>
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" matTooltip="{{'COMMON.LUU_DONG' | translate}}" *ngIf="!item.Id_Detail">
				<span translate="COMMON.CHON"></span>&nbsp;&nbsp;<div class="spinner-button-pad"></div>
			</button>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm">
		<kt-alert *ngIf="hasFormErrors" type="warn" [showCloseButton]="true" [duration]="0" (close)="onAlertClose($event)">
			Không thể lưu, vui lòng nhập đủ thông tin!
		</kt-alert>
		<div class="kt-portlet__body">
			<div class="form-group kt-form__group row">
				<div class="col-md-6 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select placeholder="{{ 'MAU_SO_LIEU.nhapsolieu' | translate }}" formControlName="PhiSoLieu" class="require" required>
							<mat-option>
								<ngx-mat-select-search  [placeholderLabel]="'Tìm kiếm...'" [noEntriesFoundLabel]="'Không tìm thấy kết quả phù hợp'" 
									[(ngModel)]="FilterCtrl_sl" [ngModelOptions]="{standalone: true}" (ngModelChange)="filter()">
								</ngx-mat-select-search>
							</mat-option>
							<mat-option value="{{phiSoLieu.id}}" *ngFor="let phiSoLieu of listPhiSoLieu$ | async;">{{phiSoLieu.title}}</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-md-6 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<mat-select placeholder="{{ 'MAU_SO_LIEU.cachnhap' | translate }}" formControlName="CachNhap" class="require" required>
							<mat-option value="{{cachnhap.id}}" *ngFor="let cachnhap of listCachNhap;">
								{{cachnhap.title}}
							</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
			</div>
		</div>
	</form>
</div>
