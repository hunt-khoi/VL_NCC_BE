<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet" [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile" style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;">
			<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="{{'COMMON.LUU_DONG' | translate}}">
				<span translate="COMMON.LUU_DONG"></span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
			</button>
			<button type="button" class="hide-view-sm" mat-raised-button color="primary" (click)="onSubmit(false)" [disabled]="disabledBtn" *ngIf="item.Id_Detail == 0" matTooltip="{{'COMMON.LUU_TIEPTUC' | translate}}">
				<span translate="COMMON.LUU_TIEPTUC"></span>&nbsp;&nbsp;<div *ngIf="this.item.Id_Detail == 0" class="spinner-button-pad"></div>
			</button>
		</div>
	</div>

	<form class="kt-form" [formGroup]="itemForm">
		<kt-alert *ngIf="hasFormErrors" type="warn" [showCloseButton]="true" [duration]="0" (close)="onAlertClose($event)">
			Không thể lưu, vui lòng nhập đủ thông tin!
		</kt-alert>

		<div class="kt-portlet__body">
			<div class="form-group kt-form__group row">
				<div class="col-md-12 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<mat-select placeholder="{{ 'SO_LIEU.NAME' | translate }}" formControlName="SoLieu" class="require" (selectionChange)="getLoaiSoLieu(filterSoLieu)" [(value)]="filterSoLieu" required>
							<mat-option value="{{soLieu.id}}" *ngFor="let soLieu of listSoLieu;">{{soLieu.title}}</mat-option>
						</mat-select>
					</mat-form-field>
				</div>
				<div class="col-md-4 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input [value]="titleLoaiSoLieu" matInput placeholder="{{ 'LOAI_SO_LIEU.NAME' | translate }}" formControlName="LoaiSoLieu" #focusInput />
					</mat-form-field>
				</div>
				<div class="col-md-2 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input [value]="uutien" matInput placeholder=" Ưu tiên" formControlName="Priority" #focusInput />
					</mat-form-field>
				</div>
				<div class="col-md-6 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid">
						<textarea [value]="mota" matInput rows="2" placeholder="Mô tả" formControlName="MoTa" focusInput></textarea>
					</mat-form-field>
				</div>
				<ng-container *ngIf="listSoLieuChild.length > 0">
					<div class="col-md-12 m--margin-bottom-20-mobile" style="padding-left: 0.8rem;">
						<b>{{ 'MAU_SO_LIEU.slbosung' | translate }}:</b>
					</div>
					<ng-container *ngFor="let sl of listSoLieuChild; let i = index;">
						<div class="col-md-10 m--margin-bottom-20-mobile">
							<mat-form-field class="mat-form-field-fluid " style="padding-left: 0.5rem;">
								<input [value]="sl.SoLieu" matInput disabled />
							</mat-form-field>
						</div>
					</ng-container>
				</ng-container>
			</div>
		</div>
	</form>
</div>
