<style>
	.button-container {
		position: fixed;
		right: 60px;
		top: 10px;
	}
	.button-container .mat-button {
		display: block;
		text-align: center;
		padding: 16px;
		transition: all 0.3s ease;
	}
</style>
<div class="button-container">
	<button style="padding: 0px 20px;" type="button" mat-raised-button color="primary" (click)="download()">
		Tải về
	</button>
</div>
<ng-container *ngIf="src">
	<iframe #iframeRef [src]="src" style="width:100%; height:100vh" frameborder="0"></iframe>
</ng-container>
