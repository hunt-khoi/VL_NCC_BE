<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<kt-portlet [options]="{headLarge: true}" [loading$]="dataSource.loading$">
	<kt-portlet-header [sticky]="true" [title]="'Chọn nhiều biểu mẫu'" [viewLoading$]="dataSource.loading$">
		<ng-container ktPortletTools>
			<div class="kt-form__group kt-form__group--inline">
				<div class="kt-form__label kt-form__label-no-wrap">
					<label class="kt--font-bold kt-font-danger-">
						Số lượng đã chọn:
						{{ selectedValue.length }}
					</label>
				</div>
			</div>
			<button type="button" mat-raised-button color="primary" (click)="luuDungCu()" [disabled]="viewLoading ||disabledBtn">Tiếp tục</button>
		</ng-container>
	</kt-portlet-header>
	<kt-portlet-body>
		<div class="m-form">
			<!-- start::FILTERS -->
			<div class="m-form__filtration">
				<div class="row align-items-center">
					<div class="col-md-6 m--margin-bottom-10-mobile">
						<mat-form-field class="mat-form-field-fluid">
							<input matInput #searchInput placeholder="Tìm kiếm"
								   class="mat-form-field mat-form-field-fluid">
						</mat-form-field>
					</div>
					<div class="col-md-6 m--margin-bottom-10-mobile">
						<button type="button" mat-raised-button color="accent" (click)="LoadDataList()" [disabled]="viewLoading">Tìm kiếm</button>
					</div>
				</div>
				<div class="mat-table__wrapper">
					<table mat-table class="lmat-elevation-z8" [dataSource]="dataSource" matSort matSortActive="id"
						   matSortDirection="asc" matSortDisableClear>
						<!-- Checkbox Column -->
						<ng-container matColumnDef="select">
							<th mat-header-cell *matHeaderCellDef class="mat-column-checkbox">
								<mat-checkbox (change)="$event ? masterToggle() : null"
											  [checked]="selection.hasValue() && isAllSelected()"
											  [indeterminate]="selection.hasValue() && !isAllSelected()">
								</mat-checkbox>
							</th>
							<td mat-cell *matCellDef="let row" class="mat-column-checkbox">
								<mat-checkbox (click)="$event.stopPropagation()"
											  (change)="change($event, row)"
											  [checked]="selection.isSelected(row)">
								</mat-checkbox>
							</td>
						</ng-container>

						<ng-container matColumnDef="DungCu">
							<th mat-header-cell *matHeaderCellDef mat-sort-header class="mat-column-vinCode min-width-th">Dụng cụ</th>
							<td mat-cell *matCellDef="let item" class="mat-column-vinCode">
								{{item.DungCu}}
							</td>
						</ng-container>
						
						<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
						<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
					</table>
					<div class="mat-table__message" *ngIf="!dataSource.hasItems">Không có dữ liệu</div>
				</div>

				<!-- start: BOTTOM -->
				<div class="mat-table__bottom">
					<mat-spinner [diameter]="20" *ngIf="dataSource.loading$ | async"></mat-spinner>
					<mat-paginator #paginator_tab1 [pageSize]="10" [pageSizeOptions]="[3, 5, 10]"
								   [length]="dataSource.paginatorTotal$ | async" [showFirstLastButtons]="true"></mat-paginator>
				</div>
			</div>
		</div>
	</kt-portlet-body>
</kt-portlet>
