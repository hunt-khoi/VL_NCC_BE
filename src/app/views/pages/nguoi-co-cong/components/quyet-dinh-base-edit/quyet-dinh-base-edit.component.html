<form class="kt-form" [formGroup]="itemForm">
	<div class="form-group row">
		<div class="col-lg-6 m--margin-bottom-20-mobile">
			<mat-form-field class="mat-form-field-fluid">
				<input matInput placeholder="Số quyết định" formControlName="SoQuyetDinh" #focusInput class="require" required/>
			</mat-form-field>
		</div>
		<div class="col-lg-6 m--margin-bottom-20-mobile">
		</div>
		<div class="col-lg-6 m--margin-bottom-20-mobile">
			<mat-form-field class="mat-form-field-fluid">
				<input matInput placeholder="Ngày ra quyết định" formControlName="NgayRaQuyetDinh" type="text" [matDatepicker]="picker" [max]="ngay2" [(ngModel)]="ngay1" class="require" required>
				<mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
				<mat-datepicker #picker></mat-datepicker>
			</mat-form-field>
		</div>
		<div class="col-lg-6 m--margin-bottom-20-mobile">
			<mat-form-field class="mat-form-field-fluid">
				<input matInput placeholder="Ngày hiệu lực" formControlName="NgayHieuLuc" type="text" [matDatepicker]="picker1" [min]="ngay1" [(ngModel)]="ngay2" class="require" required>
				<mat-datepicker-toggle matSuffix [for]="picker1"></mat-datepicker-toggle>
				<mat-datepicker #picker1></mat-datepicker>
			</mat-form-field>
		</div>
	</div>
</form>
