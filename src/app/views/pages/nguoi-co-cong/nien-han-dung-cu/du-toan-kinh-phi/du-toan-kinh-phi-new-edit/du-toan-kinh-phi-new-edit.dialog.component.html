<style>
	.example-container {
		width: 1500px;
		max-width: 100%;
		overflow: auto;
	}

	.table {
		width: 1500px;
		max-width: 100%;
		overflow: auto;
	}
	::ng-deep .mat-table{
		width: 1500px;
		max-width: 100%;
		overflow: auto;
	}
	.mat-table-sticky-border-elem-right {
		border-left: 1px solid #e0e0e0;
	}

	.mat-table-sticky-border-elem-left {
		border-right: 1px solid #e0e0e0;
	}

</style>
<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="close()" [disabled]="disabledBtn"
			title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet"
	 [ngClass]="{ 'kt-portlet--body-progress' : viewLoading, 'kt-portlet--body-progress-overlay' : loadingAfterSubmit }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '7' : '5') : (isZoomSize ? '9' : '7')}} kt-margin-bottom-10-mobile"
			 style="margin-top: 20px;">
			<h3 class="kt-portlet__head-title">{{getTitle()}}</h3>
		</div>
		<div class="col-md-{{item.Id == 0 ? (isZoomSize ? '5' : '7') : (isZoomSize ? '3' : '5')}} kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;" *ngIf="allowEdit">
			<ng-container *ngIf="!nhanban; else nhanban1">
				<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="{{'COMMON.LUU_DONG' | translate}}">
					<span translate="COMMON.LUU_DONG"></span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
				</button>
				<button class="hide-view-625" type="button" mat-raised-button color="primary" (click)="onSubmit(false)" [disabled]="disabledBtn" *ngIf="item.Id == 0" matTooltip="{{'COMMON.LUU_THEMMOI' | translate}}">
					<span translate="COMMON.LUU_THEMMOI"></span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
				</button>
			</ng-container>
			<ng-template #nhanban1>
				<button type="button" mat-raised-button color="accent" (click)="onSubmit(true)" [disabled]="disabledBtn" matTooltip="Nhân bản">
					<span> Nhân bản</span>&nbsp;&nbsp;<div *ngIf="disabledBtn" class="spinner-button-pad"></div>
				</button>
			</ng-template>
		</div>
	</div>
	<form class="kt-form" [formGroup]="itemForm"> 
		<div class="kt-portlet__body">
			<kt-alert *ngIf="hasFormErrors" type="warn" [showCloseButton]="true" [duration]="0" (close)="onAlertClose($event)">
				Không thể lưu, vui lòng nhập đủ thông tin!
			</kt-alert>

			<div class="form-group kt-form__group row">
				<div class="col-lg-6 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput placeholder="{{ 'DU_TOAN_KINH_PHI.NAME' | translate }}" formControlName="DuToan" class="require" required #focusInput />
					</mat-form-field>
				</div>
				<div class="col-lg-3 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input type="number" matInput placeholder="Năm" formControlName="Nam" class="require" required [readonly]="item.Id > 0" />
					</mat-form-field>
				</div>
				<div class="col-lg-3 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<input matInput type="number" placeholder="Thứ tự" formControlName="Priority" />
					</mat-form-field>
				</div>
				<div class="col-lg-9 m--margin-bottom-20-mobile">
					<mat-form-field class="mat-form-field-fluid ">
						<textarea matInput rows="1" placeholder="{{ 'DU_TOAN_KINH_PHI.mota' | translate }}"
							formControlName="MoTa"></textarea>
					</mat-form-field>
				</div>
				<div class="col-lg-3 m--margin-bottom-20-mobile">
					<dl-image-control *ngIf="allowEdit" [data]="imagedata" formControlName="fileDinhKems" type="image/*" nameButton="Chọn file đính kèm" [multiple]="true" [disabled]="false">
					</dl-image-control>
				</div>
			</div>
			<div>
				<span class="kt-portlet__head-title"><h5>Chi tiết dự toán</h5></span>
				<section class="example-container">
					<table mat-table [dataSource]="datasource">
						<ng-container sticky matColumnDef="STT" >
							<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell" style="width: 30px;">STT</th>
							<td mat-cell class="stt-cell" *matCellDef="let item; let i=index">{{ i + 1 }}</td>
						</ng-container>
						<ng-container sticky style="margin-left: 5px;"  matColumnDef="DoiTuong">
							<th mat-header-cell *matHeaderCellDef class="min-width-th" style="width: 20%;text-align: left;justify-content: center">
								Tên dụng cụ
							</th>
							<td mat-cell *matCellDef="let opt" style="padding-left: 5px;justify-content: center">{{opt.TenDungCu}}</td>
						</ng-container>
						<ng-container *ngFor="let dt of listdistrict; index as i">
							<ng-container matColumnDef="soluong{{dt.ID_Row}}">
								<th  style="border-left: 1px solid #c66464;" mat-header-cell *matHeaderCellDef style="text-align: center;justify-content: center;width: 100px;white-space: nowrap;">
									Số lượng
								</th>
								<td  style="border-left: 1px solid #c66464;" mat-cell matTooltip="Số lượng {{dt.District}}" *matCellDef="let opt;let i=index" style="text-align: center;justify-content: center">
									<input id="soLuong_i{{i}}" [value]="getValue(i, dt.ID_Row)" (change)="changeMuc($event,i, dt.ID_Row)" matInput type="number" min="1">
								</td>
							</ng-container>
							<ng-container matColumnDef="kinhphi{{dt.ID_Row}}">
								<th mat-header-cell *matHeaderCellDef style="text-align: center;justify-content: center;width: fit-content;white-space: nowrap;">
									Kinh phí
								</th>
								<td mat-cell matTooltip="Kinh phí {{dt.District}}" *matCellDef="let opt;let i=index" style="width: fit-content;text-align: center;justify-content: center; padding: 5px;">
									<input id="kinhPhi_i{{i}}" style="width:fit-content;" [value]="getValue(i, dt.ID_Row, false)" (change)="changeMuc($event,i,dt.ID_Row, false)" matInput type="number">
							</ng-container>

							<ng-container matColumnDef="district{{dt.ID_Row}}">
								<th mat-header-cell *matHeaderCellDef 
									style="text-align: center; padding-right: 3%;"
									[attr.colspan]="2"> 
									{{dt.District}}
								</th>
							</ng-container>
						</ng-container>
					
						<ng-container matColumnDef="empty">
							<th mat-header-cell *matHeaderCellDef 
								[style.text-align]="center"
								[attr.colspan]="2">
							</th>
						</ng-container>

						<tr mat-header-row *matHeaderRowDef="listDisplayDisctrics; sticky :true"></tr>
						<tr mat-header-row *matHeaderRowDef="displayedColumns; sticky :true"></tr>
						<tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
					</table>
				</section>

			</div>
		</div>
	</form>
</div>
