<style>
	.rowError td {
		color: red;
	}
</style>
<div class="btn-close-container">
	<button class="btn-close" type="button" mat-mini-fab color="" (click)="closeDialog()" title="Đóng">
		<mat-icon>clear</mat-icon>
	</button>
</div>
<div class="kt-portlet" [ngClass]="{ 'kt-portlet--body-progress kt-portlet--body-progress-overlay' : viewLoading }">
	<div class="kt-portlet__head kt-portlet__head__custom">
		<div class="col-md-7 kt-margin-bottom-10-mobile">
			<div class="kt-portlet__head-label">
				<h3 class="kt-portlet__head-title" style="margin-top: 20px;"><b>Import dữ liệu từ excel</b></h3>
			</div>
		</div>
		<div class="col-md-5 kt-margin-bottom-10-mobile" style="margin-top: 10px; text-align: right;">
			<button style="padding: 0px 20px;" type="button" mat-raised-button color="info" (click)="DownloadFileMau()">
				Tải file mẫu
			</button>
		</div>
	</div>
	<div class="kt-portlet__body">
		<form class="kt-form" [formGroup]="itemForm">
			<div class="form-group kt-form__group row">
				<div class="col-md-3" style="margin-top:-20px">
					<dl-image-control formControlName="file" type=".xls,.xlsx" nameButton="Chọn file" [multiple]="false" [disabled]="false" [required]="false">
					</dl-image-control>
				</div>
				<div class="col-md-3">
					<button type="button" (click)="loadImport()" mat-raised-button color="primary" matTooltip="Load" style="padding: 0px 20px;" [disabled]="viewLoading">
						Load
					</button>
				</div>
				<!-- <div class="col-md-6 text-right">
					<p>
						Load thành công : {{lstDuToan.length}} dòng dữ liệu <span style="color:red;">({{lstDuToanError.length}} lỗi)</span>
						&nbsp;<mat-checkbox (change)="filter($event)" [(ngModel)]="isError">Lọc dữ liệu lỗi</mat-checkbox>
					</p>
				</div> -->
			</div>
		</form>
		<div class="form-group kt-form__group row">
			<div class="col-md-12">
				<div class="mat-table__wrapper">
					<table mat-table [dataSource]="dataSource" style="width:100%">
						<ng-container sticky matColumnDef="STT" >
							<th mat-header-cell *matHeaderCellDef class="mat-column-vinCode stt-cell" style="width: 30px;">STT</th>
							<td mat-cell class="stt-cell" *matCellDef="let item; let i=index">{{i + 1}}</td>
						</ng-container>
						<ng-container sticky style="margin-left: 5px;"  matColumnDef="DungCu">
							<th mat-header-cell *matHeaderCellDef class="min-width-th" style="padding-left: 5px;width: 20%;text-align: left;justify-content: center">
								Tên dụng cụ
							</th>
							<td mat-cell *matCellDef="let opt" style="padding-left: 5px;padding-right: 5px;justify-content: center">{{opt.DungCu}}</td>
						</ng-container>
						<ng-container *ngFor="let dt of listdistrict; index as i">
							<ng-container matColumnDef="soluong{{dt.ID_Row}}">
								<th style="border-left: 1px solid #c66464;" mat-header-cell *matHeaderCellDef style="text-align: left;justify-content: center;width: 100px;white-space: nowrap;">
									Số lượng
								</th>
								<td style="border-left: 1px solid #c66464;" mat-cell matTooltip="Số lượng {{dt.District}}" *matCellDef="let opt;let i=index" style="text-align: center;justify-content: center">
									<mat-form-field style="width: 100%;">
										<input matInput  placeholder="Số lượng" [readonly]="!allowEdit" id="soLuong_i{{i}}" [value]="getValue(i, dt.ID_Row)" type="number" min="1">
									</mat-form-field>
								</td>
							</ng-container>
							<ng-container matColumnDef="kinhphi{{dt.ID_Row}}">
								<th mat-header-cell *matHeaderCellDef style="text-align: left;justify-content: center;width: fit-content;white-space: nowrap;">
									Kinh phí
								</th>
								<td mat-cell matTooltip="Kinh phí {{dt.District}}" *matCellDef="let opt;let i=index" style="width: fit-content;text-align: left;justify-content: center; padding: 5px;">
									<mat-form-field style="width: 100%;">
										<input matInput placeholder="Kinh phí" [readonly]="!allowEdit" id="kinhPhi_i{{i}}" style="width:fit-content;" [value]="getValue(i, dt.ID_Row, false)" type="number">
									</mat-form-field>
							</ng-container>
							<ng-container matColumnDef="district{{dt.ID_Row}}">
								<th mat-header-cell *matHeaderCellDef 
									style="text-align: center; padding-right: 3%;"
									[attr.colspan]="2"> 
									{{dt.District}}
								</th>
							</ng-container>
						</ng-container>

						<ng-container matColumnDef="empty">
							<th mat-header-cell *matHeaderCellDef 
								[style.text-align]="center"
								[attr.colspan]="2">
							</th>
						</ng-container>
						<ng-container matColumnDef="empty1">
							<th mat-header-cell *matHeaderCellDef 
								[style.text-align]="center">
							</th>
						</ng-container>

						<ng-container matColumnDef="actions">
							<th mat-header-cell *matHeaderCellDef>
							</th>
							<td mat-cell *matCellDef="let object">
								<mat-icon *ngIf="object.isError && object.message" title="{{object.message}}" color="warn">warning</mat-icon>
								<mat-icon *ngIf="object.isError && object.messageError" title="{{object.messageError}}" color="warn">warning</mat-icon>
							</td>
						</ng-container>

						<tr mat-header-row *matHeaderRowDef="listDisplayDisctrics; sticky : true"></tr>
						<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
						<tr mat-row *matRowDef="let row; columns: displayedColumns;" [ngClass]="{ 'rowError' : row.isError }"></tr>
					</table>
				</div>
			</div>
			<div class="col-md-12 kt-margin-bottom-10-mobile text-center" style="margin-top: 2%" *ngIf="itemForm.controls['file'].value && lstDuToan.length != lstDuToanError.length && lstDuToan.length > 0">
				<button style="padding: 0px 20px;" type="button" color="primary" mat-raised-button (click)="luuImport()">
					Import dữ liệu
				</button>&nbsp;
			</div>
		</div>
	</div>
</div>
