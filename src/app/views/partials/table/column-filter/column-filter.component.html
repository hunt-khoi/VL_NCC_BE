<style>
    @media print {
		.hiden-print,
        .mat-sort-header-stem,
        .mat-sort-header-stem{
			display: none!important;
		}
	}
</style>

<div *ngIf="enable_sort" mat-sort-header cdkDropList cdkDropListLockAxis="x" cdkDropListOrientation="horizontal" cdkDrag
    (cdkDropListDropped)="gridService.dropListDropped($event, column_name)" (cdkDragStarted)="gridService.dragStarted($event, column_name)">
    {{column_title}}
</div>
<div *ngIf="!enable_sort" mat-sort-header cdkDropList cdkDropListLockAxis="x" cdkDropListOrientation="horizontal" cdkDrag
    (cdkDropListDropped)="gridService.dropListDropped($event, column_name)" (cdkDragStarted)="gridService.dragStarted($event, column_name)">
    {{column_title}}
</div>
<ng-container *ngIf="!gridService.model.filterGroupDataCheckedFake[column_name]">
    <div ngbDropdown #Drop="ngbDropdown" class="d-inline-block dl-flt-drop hiden-print">
        <button class="btn drop-btn" id="dropdown" ngbDropdownAnchor (focus)="gridService.LoadDataDropFilter(column_name); Drop.open()"
            [ngClass]="{'flt-focus': gridService.model.filterText && gridService.model.filterText[column_name]}">
			<i class="fa fa-filter" aria-hidden="true"></i>
		</button>
        <div ngbDropdownMenu aria-labelledby="dropdown">
            <form class="px-4 py-3">
                <div>
                    <div>{{'COMMON.SEARCH' | translate}}</div>
                    <label>
						<mat-form-field>
							<input matInput placeholder="{{column_title}}" [ngModelOptions]="{standalone: true}"
                            [(ngModel)]="gridService.model.tmpfilterText[column_name]">
						</mat-form-field>
					</label>
                </div>
                <div class="flt-btn-action">
                    <button type="submit" class="btn btn-default" style="margin-right: 5px;" ngbDropdownItem 
                        (click)="gridService.filterHead(column_name); Drop.close();">
						{{'COMMON.XONG' | translate}}
					</button>
                    <button type="submit" class="btn btn-default" ngbDropdownItem (click)="$event.stopPropagation(); Drop.close();">
						{{'COMMON.HUY' | translate}}
					</button>
                </div>
            </form>
        </div>
    </div>
</ng-container>
<ng-container *ngIf="gridService.model.filterGroupDataCheckedFake[column_name]">
    <div ngbDropdown class="d-inline-block dl-flt-drop hiden-print" #Drop="ngbDropdown">
        <button matTooltip="Lọc" class="btn drop-btn" id="dropdownForm2" ngbDropdownToggle (focus)="gridService.LoadDataDropFilter(column_name);"
            [ngClass]="{'flt-focus': gridService.model.filterGroupData[column_name] && gridService.model.filterGroupData[column_name].length>0}">
            <i class="fa fa-filter" aria-hidden="true"></i>
        </button>
        <div ngbDropdownMenu aria-labelledby="dropdownForm2">
            <form class="px-4 py-3">
                <div>
                    <div>{{'COMMON.SEARCH' | translate}}</div>
                    <label>
						<mat-form-field>
							<input matInput placeholder="{{column_title}}" [(ngModel)]="gridService.model.tmpfilterText[column_name]" 
                            [ngModelOptions]="{standalone: true}" (ngModelChange)="gridService.filterGroupWithTextFilter(column_name)">
						</mat-form-field>
					</label>
                </div>
                <div style="margin-bottom: 15px;" class="drop-area" 
                    *ngIf="gridService.model.filterGroupDataCheckedFake && gridService.model.filterGroupDataCheckedFake[column_name]">
                    <div *ngFor="let option of gridService.model.filterGroupDataCheckedFake[column_name]; let i=index">
                        <label>
							<mat-checkbox name="Status{{i}}" value="{{option.value}}" [(ngModel)]="option.checked" 
                                (ngModelChange)="gridService.disableDoneButton(column_name)">
								{{option.name}}
							</mat-checkbox>
						</label>
                    </div>
                </div>
                <div class="flt-btn-action">
                    <button type="submit" style="margin-right: 5px; text-align: center;" class="btn btn-default" ngbDropdownItem 
                        (click)="gridService.filterHead(column_name); Drop.close();">{{'COMMON.XONG' | translate}}
                    </button>
                    <button type="submit" style="text-align: center;" class="btn btn-default" ngbDropdownItem 
                        (click)="$event.stopPropagation(); Drop.close();">{{'COMMON.HUY' | translate}}
                    </button>
                </div>
            </form>
        </div>
    </div>
</ng-container>
