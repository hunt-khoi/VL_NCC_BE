<style>
	.color-username{
		color: #fff;
	}
	@media (max-width: 1024px) {
		.color-username{
			color: #000;
		}
	}
	#scroll-text {
		/* animation properties */
		-moz-transform: translateX(100%);
		-webkit-transform: translateX(100%);
		transform: translateX(100%);
		
		-moz-animation: my-animation 10s linear infinite;
		-webkit-animation: my-animation 10s linear infinite;
		animation: my-animation 10s linear infinite;
	}

	/* for Firefox */
	@-moz-keyframes my-animation {
	from { -moz-transform: translateX(100%); }
	to { -moz-transform: translateX(-100%); }
	}

	/* for Chrome */
	@-webkit-keyframes my-animation {
	from { -webkit-transform: translateX(100%); }
	to { -webkit-transform: translateX(-100%); }
	}

	@keyframes my-animation {
	from {
		-moz-transform: translateX(100%);
		-webkit-transform: translateX(100%);
		transform: translateX(100%);
	}
	to {
		-moz-transform: translateX(-100%);
		-webkit-transform: translateX(-100%);
		transform: translateX(-100%);
	}
		/* .panel-custom-width {
		width: 300px !important;
		max-width: unset !important;
		} */
	}
	#scroll-container {
		/* border: 3px solid black; */
		/* border-radius: 5px; */
		overflow: hidden;
		/* width: fit-content; */
		max-width: 200px;
		min-width: 120px;
		}

/*  */

</style>

<div ngbDropdown  placement="bottom-right" *ngIf="user$ | async as _user" class="kt-header__topbar-item kt-header__topbar-item--user">
    <div ngbDropdownToggle class="kt-header__topbar-wrapper">
        <div class="kt-header__topbar-user" [ngClass]="{'kt-header__topbar-icon': icon}">
            <!-- <span class="kt-header__topbar-welcome kt-hidden-mobile" *ngIf="greeting">Xin chào,</span> -->
            <i *ngIf="icon" class="flaticon2-user-outline-symbol"></i>
            <!-- <img *ngIf="avatar" alt="Pic" [attr.src]="_user.avata">&nbsp; -->

			<div class="fd-avt">
				<ngx-avatar size="38" src="{{_user.avata}}" *ngIf="_user.avata; else bindText"></ngx-avatar>
				<ng-template #bindText>
					<div style="padding-right: 5px;">
						<ngx-avatar size="38" bgColor="{{commonService.get_colorByName(_user.charname)}}" [name]="_user.charname"></ngx-avatar>
					</div>
				</ng-template>
			</div>

			<div *ngIf="_user.fullname.length >= 20; else temp" matTooltip="{{_user.fullname}}" id="scroll-container">
				<span id="scroll-text" class="kt-header__topbar-username color-username" *ngIf="greeting">{{_user.fullname}}</span>
			</div>
			<ng-template #temp>
				<span style="width: 150px" class="kt-header__topbar-username color-username" *ngIf="greeting">{{_user.fullname}}</span>
			</ng-template>
            <!-- <span class="kt-header__topbar-username kt-hidden-mobile" style="color: #fff;" *ngIf="greeting"> {{_user.fullname}}</span> -->
            <span *ngIf="badge" class="kt-badge kt-badge--username kt-badge--unified-success kt-badge--lg kt-badge--rounded kt-badge--bold">{{_user.fullname|firstLetter}}</span>
        </div>
    </div>
